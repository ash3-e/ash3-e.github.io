## 19.10 Multiline packet: fixed-bound (`i.t[`)

| Syntax | Meaning |
| --- | --- |
|<pre><code class="language-bcode">1.3[ 10A 0.0a</code></pre> | *Assigns&nbsp;`[=1.3`&nbsp;as&nbsp;packet&nbsp;index/total,&nbsp;assigns&nbsp;`A=10`,&nbsp;then&nbsp;latches&nbsp;on&nbsp;`a`.*|
|<pre><code class="language-bcode">2.3[ 11A 0.0a</code></pre> | *Assigns&nbsp;`[=2.3`&nbsp;as&nbsp;packet&nbsp;index/total,&nbsp;assigns&nbsp;`A=11`,&nbsp;then&nbsp;latches&nbsp;on&nbsp;`a`.*|
|<pre><code class="language-bcode">3.3[ 12A 0.0a</code></pre> | *Assigns&nbsp;`[=3.3`&nbsp;as&nbsp;packet&nbsp;index/total,&nbsp;assigns&nbsp;`A=12`,&nbsp;then&nbsp;latches&nbsp;on&nbsp;`a`.*|

```bcode
1.3[ 10A 0.0a
2.3[ 11A 0.0a
3.3[ 12A 0.0a
```

Receivers buffer packet lines and deliver them as an atomic group. This is a stream-native way to do “batch semantics” without inventing external framing.

---

## 19.11 Multiline packet: open-ended (`>n[` … closed by `n.t[`)

| Syntax | Meaning |
| --- | --- |
|<pre><code class="language-bcode">&gt;1[ 10A 0.0a</code></pre> | *Assigns&nbsp;`[`&nbsp;as&nbsp;open-ended&nbsp;packet&nbsp;index&nbsp;>1,&nbsp;assigns&nbsp;`A=10`,&nbsp;then&nbsp;latches&nbsp;on&nbsp;`a`.*|
|<pre><code class="language-bcode">&gt;2[ 11A 0.0a</code></pre> | *Assigns&nbsp;`[`&nbsp;as&nbsp;open-ended&nbsp;packet&nbsp;index&nbsp;>2,&nbsp;assigns&nbsp;`A=11`,&nbsp;then&nbsp;latches&nbsp;on&nbsp;`a`.*|
|<pre><code class="language-bcode">3.3[ 12A 0.0a</code></pre> | *Assigns&nbsp;`[=3.3`&nbsp;as&nbsp;the&nbsp;closing&nbsp;bound,&nbsp;assigns&nbsp;`A=12`,&nbsp;then&nbsp;latches&nbsp;on&nbsp;`a`.*|

```bcode
>1[ 10A 0.0a
>2[ 11A 0.0a
3.3[ 12A 0.0a
```

Open-ended packets are great when you can’t know the line count up front (e.g., directory listings, table dumps, streamed results). The close line makes the end unambiguous.

---

## 19.12 Sequence counter (`]`) for dropout detection

| Syntax | Meaning |
| --- | --- |
|<pre><code class="language-bcode">100] 10A 0.0f</code></pre> | *Assigns&nbsp;`]=100`&nbsp;as&nbsp;a&nbsp;sequence&nbsp;counter,&nbsp;assigns&nbsp;`A=10`,&nbsp;then&nbsp;latches&nbsp;on&nbsp;`f`.*|
|<pre><code class="language-bcode">101] 11A 0.0f</code></pre> | *Assigns&nbsp;`]=101`&nbsp;as&nbsp;a&nbsp;sequence&nbsp;counter,&nbsp;assigns&nbsp;`A=11`,&nbsp;then&nbsp;latches&nbsp;on&nbsp;`f`.*|
|<pre><code class="language-bcode">0] 12A 0.0f</code></pre> | *Assigns&nbsp;`]=0`&nbsp;as&nbsp;a&nbsp;reset/discontinuity&nbsp;signal,&nbsp;assigns&nbsp;`A=12`,&nbsp;then&nbsp;latches&nbsp;on&nbsp;`f`.*|

```bcode
100] 10A 0.0f
101] 11A 0.0f
0] 12A 0.0f
```

Sequence discontinuities let tooling say “something happened” (drop, reset, reconnect) without guessing. That’s invaluable on flaky serial links.

---

## 19.13 Payload realism: string payloads (`$…`)

```bcode
$hello world
```
A `$` payload is an opaque string body terminated by newline (or NUL). It’s useful for human-visible text, firmware identifiers, or log messages without JSON escaping rituals.

---

## 19.14 Hex payloads (`%…%`): readable binary snapshots

```bcode
%DE AD BE EF%
```
Hex payloads are a practical “bridge form” when you want to carry bytes but still keep logs inspectable. Whitespace and comments can live inside the `%…%` block in many tooling contexts.

---

## 19.15 Raw binary payloads (`&`): exact bytes, no base64

| Syntax | Meaning |
| --- | --- |
|<pre><code class="language-bcode">16&amp; 0.0u</code></pre> | *Command&nbsp;expects&nbsp;a&nbsp;raw-binary&nbsp;payload&nbsp;of&nbsp;length&nbsp;16&nbsp;bytes,&nbsp;then&nbsp;latches&nbsp;on&nbsp;`u`&nbsp;after&nbsp;payload&nbsp;receipt.*|

```bcode
16& 0.0u
```

This is the “no-gymnastics” payload path: bytes are bytes. It’s especially attractive for calibration blobs, waveform fragments, and device snapshots.

---

## 19.16 Scientific notation: large/small without changing the wire feel

| Syntax | Meaning |
| --- | --- |
|<pre><code class="language-bcode">123*3A 0.0f</code></pre> | *Assigns&nbsp;`A`&nbsp;with&nbsp;exponent-scaled&nbsp;numeric&nbsp;spelling&nbsp;(×10^3),&nbsp;then&nbsp;latches&nbsp;on&nbsp;`f`.*|
|<pre><code class="language-bcode">45/2B 0.0f</code></pre> | *Assigns&nbsp;`B`&nbsp;with&nbsp;exponent-scaled&nbsp;numeric&nbsp;spelling&nbsp;(×10^-2),&nbsp;then&nbsp;latches&nbsp;on&nbsp;`f`.*|

```bcode
123*3A 0.0f
45/2B 0.0f
```

This keeps values compact in a way engineers recognize immediately, while still letting parsers treat the exponent as structured metadata.

---

## 19.17 Resource-oriented streams (BCODe.rest): ID + index + command

| Syntax | Meaning |
| --- | --- |
|<pre><code class="language-bcode">0@ 12345.7a</code></pre> | *Assigns&nbsp;`@=0`&nbsp;as&nbsp;resource&nbsp;index,&nbsp;then&nbsp;latches&nbsp;on&nbsp;command&nbsp;`a`&nbsp;for&nbsp;resource&nbsp;12345&nbsp;with&nbsp;sequence&nbsp;7.*|
|<pre><code class="language-bcode">2@ 12345.7e</code></pre> | *Assigns&nbsp;`@=2`&nbsp;as&nbsp;resource&nbsp;index,&nbsp;then&nbsp;latches&nbsp;on&nbsp;command&nbsp;`e`&nbsp;for&nbsp;resource&nbsp;12345&nbsp;with&nbsp;sequence&nbsp;7.*|

```bcode
0@ 12345.7a
2@ 12345.7e
```

This pattern scales well: the command number is the resource key, `@` selects the instance, and the command letter expresses intent (read/write/control/feed/allocate).

---

## 19.18 Ordinals (`*R`) as response “lanes” (direct vs delayed)

| Syntax | Meaning |
| --- | --- |
|<pre><code class="language-bcode">^ 0@ 12345.7*0a</code></pre> | *Affirmative&nbsp;ack&nbsp;for&nbsp;sequence&nbsp;7&nbsp;at&nbsp;ordinal&nbsp;0,&nbsp;then&nbsp;latches&nbsp;on&nbsp;`a`.*|
|<pre><code class="language-bcode">^\ 0@ 10A 12345.7*1a</code></pre> | *Unsolicited&nbsp;follow-on&nbsp;result&nbsp;at&nbsp;ordinal&nbsp;1,&nbsp;then&nbsp;latches&nbsp;on&nbsp;`a`.*|

```bcode
^ 0@ 12345.7*0a
^\ 0@ 10A 12345.7*1a
```

Ordinals let one request evolve into multi-stage reporting without renumbering the command sequence. It’s a clean way to handle “ack now, results later.”

---

## 19.19 Engineering use case: temperature controller (constraint + stale readback)

| Syntax | Meaning |
| --- | --- |
|<pre><code class="language-bcode">&gt;1200T 0.0c</code></pre> | *Assigns&nbsp;`T`&nbsp;as&nbsp;a&nbsp;lower&nbsp;bound&nbsp;(>1200)&nbsp;set&nbsp;intent,&nbsp;then&nbsp;latches&nbsp;on&nbsp;`c`.*|
|<pre><code class="language-bcode">^ 0.0c</code></pre> | *Affirmative&nbsp;response&nbsp;(ack),&nbsp;then&nbsp;latches&nbsp;on&nbsp;`c`.*|
|<pre><code class="language-bcode">!1198T 0.0f</code></pre> | *T&nbsp;has&nbsp;the&nbsp;numeric&nbsp;content&nbsp;1198,&nbsp;but&nbsp;it&nbsp;is&nbsp;stale,&nbsp;then&nbsp;latches&nbsp;on&nbsp;`f`.*|
|<pre><code class="language-bcode">1203T 0.0f</code></pre> | *Assigns&nbsp;`T=1203`&nbsp;as&nbsp;a&nbsp;fresh&nbsp;readback,&nbsp;then&nbsp;latches&nbsp;on&nbsp;`f`.*|

```bcode
>1200T 0.0c
^ 0.0c
!1198T 0.0f
1203T 0.0f
```

This shows three core ideas at once: intent via bounds, atomic ack via meta tags, and the ability to explicitly distinguish “old but still informative” from “fresh.”

---

## 19.20 Scientific instrumentation: saturation and diagnostics (spectrometer-style)

| Syntax | Meaning |
| --- | --- |
|<pre><code class="language-bcode">&gt;?I 0.0f</code></pre> | *I&nbsp;represents&nbsp;positive&nbsp;infinity&nbsp;(sensor&nbsp;saturated),&nbsp;then&nbsp;latches&nbsp;on&nbsp;`f`.*|
|<pre><code class="language-bcode">42&lt;&gt;I 0.0f</code></pre> | *I&nbsp;is&nbsp;signaling&nbsp;NaN&nbsp;with&nbsp;diagnostic&nbsp;code&nbsp;42&nbsp;(structured&nbsp;fault),&nbsp;then&nbsp;latches&nbsp;on&nbsp;`f`.*|
|<pre><code class="language-bcode">-?I 0.0f</code></pre> | *I&nbsp;is&nbsp;present&nbsp;but&nbsp;unstable/noisy&nbsp;(transient),&nbsp;then&nbsp;latches&nbsp;on&nbsp;`f`.*|

```bcode
>?I 0.0f
42<>I 0.0f
-?I 0.0f
```

A lot of lab gear needs to say “not a number, and here’s why.” Inline value classes make that honest, compact, and machine-checkable.

---

## 19.21 One last “debugger’s trick”: grep patterns that stay meaningful

```bash
grep 'T'      # find any temperature-related fields in logs
grep 'c$'     # find command c lines (command terminator at end)
grep '^\^'    # find affirmative responses
grep '^\^\\'  # find unsolicited follow-ons
```

BCODe examples are designed to remain readable under commodity tools. When you can search logs effectively, you debug faster—and a stream protocol lives or dies by debuggability.
