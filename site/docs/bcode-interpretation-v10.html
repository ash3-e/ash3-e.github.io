  <script id="md-source" type="text/plain"># BCODe Value Interpretation (Draft v10)

- Status: Draft
- Interpretation version: v10
- Document date: 2026-02-04
- Audience: API designers & implementers

This companion document defines **standard interpretations** of BCODe fields:
how to reason about data quality, special values, and typed accessors.

Syntax is defined separately: [BCODe Syntax Specification (Draft v10)](bcode-syntax-with-tests-v10.html)

## 1. Scope

This document defines standard ways to interpret parsed BCODe syntax. It does not assign meaning to specific
parameter characters or command characters (those are application-defined), but it does define:

- how qualifier combinations communicate value class and data quality
- how “stale” is represented without breaking other value classes (e.g., infinity)
- what numeric shapes exist and how typed accessors should behave

## 2. Parsed field model

A syntax parser produces, for each field, a record containing:

- `qual_mask` for `- < > ?`
- `stale` for `!`
- `shape`: empty / single / pair
- `value1`, `value2`, `value2_neg`, `frac_width`
- `exp_present`, `exp10` (scientific exponent suffix)

> **Note:** For interoperability, applications should treat these as the “raw parsed truth” and avoid inferring type
> until the command (line terminator) is known.

## 3. Quality-first telemetry model

In telemetry, the first question is often “is the monitoring system healthy?”, followed by “is the data usable?”,
and only then “what is the numeric value?”.

> **Requirement:** A typed accessor MUST be able to refuse to provide a hard numeric value when the field indicates:
> unknown/pending, null/no-data, invalid (NaN), infinity, epsilon-only, or other non-finite/non-hard states.

To support both “strict hard-number” users and “simple systems”, a single accessor contract is recommended:

> **Note:** **Recommended accessor contract:**
> 
> The caller initializes an output variable and passes a pointer to it. If the field is not compatible with
> the requested type or quality, the accessor returns `false` and MUST NOT assign the output.
> Otherwise it returns `true` and assigns the output.

## 4. Staleness (orthogonal modifier)

A stale value is not automatically invalid: it may be a previously valid value that has not been refreshed or is sourced
from a released event/log entry.

> **Requirement:** The `!` qualifier is an **orthogonal freshness modifier** that may be combined with any base value class,
> including infinity and NaN. Staleness does not change the base value class.

Implementations may choose to treat stale as “propagate like NaN”, or as “monitoring system fault”, or as “use last known value”,
depending on context (real-time vs event-log).

## 5. Base qualifier truth table (- < > ?)

The four base qualifiers (`-`, `<`, `>`, `?`) define the base value class.
The `!` stale modifier is handled separately (Section 4).

> **Requirement:** **Reservation:** the combinations `<>` and `-<>` are reserved for
> **signaling NaN** (sNaN) and MUST be used only with a single-number field shape (C1).
> The numeric `value1` conveys the signaling-NaN payload/code (application-defined).

**Table 8.1 — Base qualifier combinations and standardized value classes (symbols show which base qualifiers are present)**

| - | < | > | ? | Base interpretation | Notes |
| --- | --- | --- | --- | --- | --- |
|  |  |  |  | Normal positive finite value | Hard numeric value |
| - |  |  |  | Negative finite value | Hard numeric value; sign preserved |
|  | < |  |  | Value less than stated | Upper bound; not a hard value |
| - | < |  |  | Negative value less than stated | Upper bound on negative value |
|  |  | > |  | Value greater than stated | Lower bound; not a hard value |
| - |  | > |  | Negative value greater than stated | Lower bound on negative value |
|  |  |  | ? | Unknown or pending calculation | No numeric value should be used |
| - |  |  | ? | Excessive noise / unstable signal | Quality failure; numeric may be present but SHOULD NOT be treated as hard |
|  | < |  | ? | Positive epsilon (smallest measurable +) | Special finite sentinel |
| - | < |  | ? | Negative epsilon (smallest measurable -) | Special finite sentinel |
|  |  | > | ? | Positive infinity | Beyond measurable range |
| - |  | > | ? | Negative infinity | Below measurable range |
|  | < | > |  | **Signaling NaN (sNaN)** | **Reserved; only valid as C1; value1 encodes sNaN payload** |
| - | < | > |  | **Signaling NaN (sNaN), sign preserved** | **Reserved; only valid as C1; value1 encodes sNaN payload** |
|  | < | > | ? | Null value (no data available) | Distinct from empty field; numeric digits MAY be 0 |
| - | < | > | ? | NaN (invalid computational result) | Quiet/invalid; sign preserved; not a hard value |

> **Note:** The table describes the *base* class only. If `!` is also present, the value is stale but remains in the same base class.
> For example, `>?` is “positive infinity”; `!>?` is “stale positive infinity”.

## 6. Field numeric variants & accessors

These are the syntactic numeric variants that can arise in a field, independent of the command/parameter meaning.

### 6.1 Syntactic numeric variants

| Variant | Condition | Available data |
| --- | --- | --- |
| Absent numeric | Shape C0 (empty field) | Qualifiers, stale flag only |
| Single integer mantissa | Shape C1, no second value | `value1` |
| Fixed-point mantissa | Shape C2 (two integers) | `value1`, `value2`, `value2_neg`, `frac_width` |
| Exponent-decorated mantissa | `exp_present==true` | `exp10` plus either single or fixed-point mantissa |
| Integer triplet view (three integers) | Shape C1 or C2 (any exponent state) | `value1`, `signed_value2` (derived from `value2` + `value2_neg`; 0 if absent), `exp10` (0 if exponent absent; see `exp_present`) |

> **Note:** A numeric field may also be treated as a **three-integer tuple** (“triplet”) for application-defined purposes: `(value1, signed_value2, exp10)`, where `signed_value2 = value2_neg ? -value2 : value2`. When the second value is absent (C1), treat `signed_value2` as 0 and `frac_width` as 0. When the exponent suffix is absent, treat `exp10` as 0; `exp_present` records whether an exponent was explicitly encoded.


### 6.2 Typed accessor philosophy

> **Requirement:** A typed accessor chooses a target type (e.g., `bool`, `int64`, `double`, fixed-point)
> and either:
> **(a)** succeeds and assigns a well-defined value, or
> **(b)** fails and does not assign.

### 6.3 Suggested accessors (informative)

- `try_get_i64`: succeeds only for finite hard numeric values representable as signed 64-bit integer
- `try_get_u64`: succeeds only for finite hard numeric values representable as unsigned 64-bit integer
- `try_get_fixed`: returns (sign, value1, value2, value2_neg, frac_width, exp10) as a structured fixed-point+exponent tuple
- `try_get_double` / `try_get_float`: converts fixed-point+exponent to IEEE-754, failing on NaN/Null/Unknown if desired
- `quality_class`: returns an enum (HardFinite, Bound, Unknown, Noise, Epsilon, Infinity, Null, sNaN, NaN, …)

> **Warning:** “Bounds” (`<` or `>`) are not hard values. Accessors that return hard numerics SHOULD reject bounds unless the API
> explicitly provides an interval/bound type.

## 7. Exponent semantics

If `exp_present` is true, the mantissa is scaled by a power of ten:

```text
numeric_value = mantissa * 10^exp10
```

### 7.1 Mantissa construction

If the field is C1, `mantissa` is based on `value1`. If the field is C2, the mantissa is a fixed-point value:

```text
mantissa(C2) = value1 + (signed_value2 / 10^frac_width)
```

In syntax v10, the sign of the second component is encoded by the pair separator: `.` implies `value2_neg=false`, `,` implies `value2_neg=true`. Define `signed_value2 = value2_neg ? -value2 : value2`.

Overall sign handling and special value classes (NaN, Infinity, etc.) are controlled by qualifiers and are handled by the accessor logic; the sign of `value2` (if present) is controlled by the pair separator in syntax v10.

### 7.2 Integer accessors and exponent

> **Note:** Implementations may choose one of two strategies:
> **(a)** reject any exponent for integer accessors (simpler), or
> **(b)** allow exponent where the result is an integer and is representable (more flexible).
> BCODe does not mandate either choice.

## 8. Recommendations for API consumers

- Prefer checking a quality classifier (or accessor return values) before using numeric results.
- Treat `!` as context-dependent: stale is not invalid, but may require propagation or alarms.
- Keep command-to-parameter meaning mapping separate from syntax parsing.
- Use `%...%` payloads when you want to embed comments alongside binary.

## 9. Transform stage & cookbook

BCODe interpretation MAY include one or more *transforms* that operate on an already-latched line record
(fields + qualifiers), before reducers or typed accessors are applied. Transforms operate on an in-memory
representation; they do not change the on-wire syntax rules and they are not tied to any particular device
lifecycle process.

### 9.1 Transform invariants

**Requirement (Normative):** A transform MUST maintain internal consistency of each field:

- **C0** (empty): MUST set `value1=value2=0`, `value2_neg=0`, and `frac_width=0` (and SHOULD clear exponent metadata).
- **C1** (single): MUST set `value2=0`, `value2_neg=0`, and `frac_width=0`.
- **C2** (pair): MUST ensure `frac_width >= 1` and define `value2` (may be 0) and `value2_neg` (may be 0).

### 9.2 Bitmask selection

Since there are exactly 32 parameter identities, transforms SHOULD select which fields to act on using a
`uint32_t` mask where bit `i` corresponds to parameter index `i` (low 5 bits).

### 9.3 Transform cookbook

The following cookbook lists common generic transforms. These are *illustrative* building blocks and can be
used in any multi-stage processing pipeline.

| Transform pattern | Operation | Typical effect | Notes |
| --- | --- | --- | --- |
| Drop selected fields | Clear present bit; zero field record | Field disappears for downstream layers | Good for filtering or masking at different software layers. |
| Force stale | Set `stale=1` | Downstream sees `OK_STALE` for successful accessors | Stale is orthogonal; does not change ValueKind. |
| Clear stale | Set `stale=0` | Downstream treats values as fresh | Useful when a layer externalizes freshness tracking elsewhere. |
| Rewrite qualifier class | Map one `qual_mask` to another | Converts ValueKind buckets without changing numeric payload | Example: map `VK_NULL` to `VK_UNKNOWN` while preserving diagnostic codes (D1/D2/D3). |
| Normalize empty to explicit NULL | If `shape=C0`, set `qual_mask` to the NULL combination | Turns “present but empty” into “present and explicitly NULL” | Only a convention; wire format still allows empty fields. |
| Enforce sNaN shape | If `qual_mask` is sNaN and `shape!=C1`, coerce to C1 | Makes standardized `get_snan()` usable | Recommended but not required. |
| Clamp exponent magnitude | Limit `exp10` to a safe range | Avoids extreme scaling during float conversion | Protects consumers from accidental or malicious huge exponents. |
| Inject default diagnostics | If diagnostic ValueKind and C0, set C1 and `value1=0` | Guarantees a code slot exists | Pairs well with `bcode_field_get_diag()`, which already supports D0. |

### 9.4 Reference C API

A reference transform + reducer API is provided in `bcode_interp_v3.h` / `bcode_interp_v3.c`.
It defines field-local transforms selected by a 32-bit mask and an optional whole-line transform hook.

## 10. Line reduction (bitmask reducer)

A *line reducer* summarizes a latched line by folding per-field status into bitmasks. This provides a
policy-light mechanism for software layers to decide how to handle data quality without assigning semantic meaning
to any specific parameter or command.

### 10.1 Inputs

- `check_mask`: which parameter indices to evaluate.
- `require_mask`: subset of `check_mask` that must be “hard-number OK” (optional).

### 10.2 Outputs

The reducer SHOULD produce at least the following masks (intersection with `check_mask` implied):

- `missing_mask` — checked but absent
- `empty_mask` — present but C0
- `stale_mask` — present and stale
- `exact_mask`, `bound_mask`
- `diag_mask` — union of diagnostic buckets (unknown/noise/epsilon/null/qnan/snan/inf)
- `hard_ok_mask` — present, non-empty, and exact
- `hard_ok_all_required` — derived boolean indicating `require_mask` is satisfied

### 10.3 Reference pseudocode

```text
missing_mask = check_mask & ~present_mask
for each i in 0..31:
  if !(check_mask & (1<<i)) continue
  if !(present_mask & (1<<i)) continue
  if fields[i].stale: stale_mask |= (1<<i)
  if fields[i].shape==C0: empty_mask |= (1<<i)
  kind = classify(fields[i].qual_mask)
  ... set exact/bound/diag bucket masks ...
  if fields[i].shape!=C0 and kind is exact: hard_ok_mask |= (1<<i)

hard_ok_all_required =
  ((require_mask & ~hard_ok_mask) == 0) &&
  ((require_mask & (missing_mask | empty_mask)) == 0)
```

The reducer itself does not decide whether UNKNOWN is “bad” or “acceptable”; layers can apply their own policy
to the output masks.

## 11. Policy examples using masks

This section is **informative**. It illustrates how different software layers can use the same
reducer output masks (`missing_mask`, `diag_mask`, `stale_mask`, etc.)
while applying different local policy. No specific device lifecycle process is assumed.

### 11.1 Display / UI layer (best-effort)

Goal: show the operator as much as possible, including bounds and diagnostic codes.

- `check_mask`: the set of fields you want to render (often “all present”).
- `require_mask`: 0 (UI does not require hard numbers).

Suggested rules:

- If a field is in `exact_mask`, show the value (and a stale badge if in `stale_mask`).
- If a field is in `bound_mask`, show “<” or “>” plus the stated bound value.
- If a field is in `diag_mask`, show the qualifier state and extract codes using `bcode_field_get_diag()`.

### 11.2 Control loop layer (strict hard-number gating)

Goal: use only hard numeric data for actuation or control updates.

- `check_mask`: parameters used by the control law.
- `require_mask`: usually equal to `check_mask`.

Suggested rules:

- If `hard_ok_all_required` is false, skip the update (or enter a hold/fallback mode).
- If any required bit is set in `stale_mask`, either reject the update or apply a dedicated stale policy.
- If any required bit is set in `diag_mask`, do not attempt typed numeric accessors for those fields.

```text
bcode_reduce_t R;
bcode_reduce_line(&line, check_mask, require_mask, &R);

if (!R.hard_ok_all_required) { /* hold/fallback */ }

uint32_t req_stale = R.stale_mask & require_mask;
if (req_stale) { /* stale handling */ }
```

### 11.3 Alarm / health monitoring layer (mask-based triage)

Goal: detect and report exceptional states quickly, while still recording diagnostic payload codes.

- `check_mask`: subset of parameters representing health indicators and critical telemetry.
- `require_mask`: optional; for alarms it is often 0 (alarms look at qualifiers first).

Example triage policy (informative):

- If `snan_mask` intersects the check set, raise a high-severity fault (extract sNaN code).
- If `qnan_mask` intersects the check set, raise a computation fault.
- If `null_mask` intersects the check set, raise a missing-data alert (severity is local policy).
- If `noise_mask` intersects the check set, raise a degraded-signal alert.
- Use `bcode_field_get_diag()` to extract any D1/D2/D3 codes for logging/diagnostics.

### 11.4 Logging layer (preserve + annotate)

Goal: preserve the original line (raw bytes and/or parsed fields) and optionally add machine-readable annotations.

A common strategy is:

- Store the raw line bytes (or event stream boundaries) separately.
- Store the parsed latched line record (presence + field structs).
- Optionally apply transforms to normalize representation for indexing/search (without modifying the stored raw record).
- Store reducer masks alongside the record to support queries (e.g., “show lines where any checked field was NULL”).

### 11.5 Transform usage in policy pipelines

Transforms can be used as generic pre-processing steps before the reducer. Examples:

- Clear stale on selected parameters (if freshness is tracked externally).
- Rewrite qualifier buckets to a local convention (e.g., treating a specific bucket as UNKNOWN for downstream compatibility).
- Clamp exponent magnitude before float conversion.

## 12. C API quick reference

This section is **informative**. It provides a compact reference intended to support correct
auto-generation of consumer code. The normative behavior remains the tables and requirements in this document.

### 12.1 Recommended processing pipeline

```text
stream bytes
  -> parse (syntax; latch on CMD)
  -> optional transform pipeline (field-local and/or line-level)
  -> reduce line (bitmask summary for chosen fields)
  -> typed accessors (strict numeric, bounds, tuples, diagnostics)
```

Syntax parsing rules are defined in the companion document `bcode-syntax-with-tests-v10.html`.

### 12.2 Core record types (from `bcode_interp_v3.h`)

```text
typedef struct {
  uint8_t      qual_mask;   // '-' '<' '>' '?' (4-bit)
  bool         stale;       // '!' modifier
  bcode_shape_t shape;      // C0/C1/C2
  uint64_t     value1;
  uint64_t     value2;
  bool         value2_neg;  // true iff the pair separator was ',' (syntax v10)
  uint32_t     frac_width;  // digit count of value2 (sign does not contribute)
  bool         exp_present;
  int32_t      exp10;
} bcode_field_t;

typedef struct {
  uint8_t    cmd;
  uint32_t   present_mask;  // bit i => param i present
  bcode_field_t fields[32];
} bcode_line_t;
```

### 12.3 Return-code conventions

| Return | Meaning | Out params written? |
| --- | --- | --- |
| `BC_OK` | success (fresh) | yes |
| `BC_OK_STALE` | success (stale) | yes |
| `BC_ERR_ABSENT` | parameter not present | no |
| `BC_ERR_EMPTY` | present but empty (C0) | no |
| `BC_ERR_SHAPE` | wrong syntactic form for accessor | no |
| `BC_ERR_QUALITY` | wrong qualifier/ValueKind for accessor | no |
| `BC_ERR_OVERFLOW` | conversion overflow/underflow | no |

### 12.4 Key functions (grouped)

#### Classification

- `bcode_classify_kind(qual_mask)`
- `bcode_field_get_kind(present, field, &kind, &stale)`

#### Diagnostics

- `bcode_field_get_diag(present, field, &diag)` — returns D0/D1/D2/D3-style codes (always succeeds for present fields).
- `bcode_field_get_snan(present, field, &code, &sign)` — standardized sNaN code (C1 only).

#### Bounds

- `bcode_field_get_bound_scalar_parts(present, field, &rel, &parts)`

#### Tuples (suffix integer)

- `bcode_field_get_triplet_u(present, field, &a, &b, &b_width, &c)`

#### Strict numeric measurements (exact-only)

- `bcode_field_get_scalar_parts_exact(present, field, &parts)`
- `bcode_field_get_i64(present, field, &out)`
- `bcode_field_get_u64(present, field, &out)`
- `bcode_field_get_bool(present, field, &out)`
- `bcode_field_get_double(present, field, &out)`

#### Fixed-point helpers (exact-only)

- `bcode_field_get_coeff_scale10_exact(present, field, &sign, &coeff, &scale10)`
- `bcode_field_get_i64_scale10(present, field, out_scale10, &out)`
- `bcode_field_get_u64_scale10(present, field, out_scale10, &out)`

#### Transforms

- `bcode_apply_field_transform(&line, selection_mask, fn, user)`
- `bcode_apply_line_transform(&line, fn, user)`

#### Reducer

- `bcode_reduce_line(&line, check_mask, require_mask, &out)`

### 12.5 Parameter bit mapping

Parameter identity is defined by the low 5 bits. For a PARAM terminator byte `t` (0x40..0x5F):

```text
uint8_t param_index = (uint8_t)(t & 0x1F);  // 0..31
uint32_t param_bit  = 1u << param_index;
```

### 12.6 Canonical field normalization (for parser adapters)

Many streaming parsers represent numeric accumulation using internal state (decimal vs hex mode, digit counters, etc.).
This specification defines a compact `bcode_field_t` record for consumers. The adapter between a parser and
`bcode_field_t` SHOULD apply a small normalization pass so that downstream code never sees inconsistent field states.

#### 12.6.1 Normalize a single field record

**Goal:** enforce the invariants of C0/C1/C2 and exponent metadata.

```text
// normalize_field(f)
// - modifies *f in place
// - may be called after each FIELD event from the parser, before storing into the line map
normalize_field(bcode_field_t *f) {
  // Qualifiers are 4-bit only: '-' '<' '>' '?'
  f->qual_mask &= 0x0F;

  // If exponent not present, canonicalize exp10 to 0
  if (!f->exp_present) {
    f->exp10 = 0;
  }

  // Canonicalize by shape
  switch (f->shape) {
    case BC_SHAPE_EMPTY:   // C0
      f->value1 = 0;
      f->value2 = 0;
      f->value2_neg = false;
      f->frac_width = 0;
      f->exp_present = false;
      f->exp10 = 0;
      break;

    case BC_SHAPE_SINGLE:  // C1
      f->value2 = 0;
      f->value2_neg = false;
      f->frac_width = 0;
      // exp_present/exp10 preserved
      break;

    case BC_SHAPE_PAIR:    // C2
      // frac_width MUST be >= 1 for a real pair (second component exists)
      // If your parser can never produce frac_width==0 for C2, you can omit this clamp.
      if (f->frac_width == 0) f->frac_width = 1;
      // exp_present/exp10 preserved
      break;

    default:
      // Unknown shape: treat as empty
      f->shape = BC_SHAPE_EMPTY;
      f->value1 = 0;
      f->value2 = 0;
      f->value2_neg = false;
      f->frac_width = 0;
      f->exp_present = false;
      f->exp10 = 0;
      break;
  }
}
```

#### 12.6.2 Canonical line assembly from parser events

A common parser API emits events like `FIELD(term, is_cmd, field_record)` and `LATCH(cmd)`.
The following adapter pattern is recommended. It is chunking-invariant and requires no inter-parameter dependencies.

```text
// on_line_begin():
line.cmd = 0;
line.present_mask = 0;
zero(line.fields);

// on_field(term, is_cmd, parsed_field):
uint8_t idx = (uint8_t)(term & 0x1F);   // 0..31 identity
bcode_field_t f = parsed_field;
normalize_field(&f);

// Store policy for duplicate parameters within one line:
// - recommended: last occurrence wins (overwrite)
// - alternative: first wins, or signal an error (local policy)
line.fields[idx] = f;
line.present_mask |= (1u << idx);

// If the terminator is a CMD, the line is latched now:
if (is_cmd) {
  line.cmd = term;
  deliver_latched_line(&line);  // reducer / transforms / accessors operate here
  // Then reset for next line:
  line.cmd = 0;
  line.present_mask = 0;
  zero(line.fields);
}
```

### 12.7 Payload latching adapter (reference)

Payloads (`$` string, `%` hex, `&` raw) are *line-scoped* and are latched at the same time as fields:
they belong to the buffered line record that becomes visible to the application when the command character is read.
Payload contents are opaque to the syntax parser; interpretation is up to the application.

In `bcode-syntax-with-tests-v10.html`, `$` and `%` MAY be preceded by an optional integer
*length hint*. The canonical parser surfaces these hints at payload-begin time so receivers can size buffers and optionally
validate transmission integrity. A length-hint mismatch is a syntax error and the line MUST be treated as invalid (no latch).

```text
typedef enum {
  BC_PL_STRING = 1,
  BC_PL_HEX    = 2,
  BC_PL_RAW    = 3,
} bc_payload_kind_t;

typedef struct {
  bc_payload_kind_t kind;

  bool     len_present;
  uint64_t len_hint;     // $: bytes excluding LF/NUL; %: decoded bytes; &: exact bytes

  // Only for kind==BC_PL_STRING:
  uint8_t  str_term;     // LF (0x0A) or NUL (0x00)

  // Storage policy is up to you:
  //   - buffer bytes here (fixed / dynamic)
  //   - stream them to a file/socket
  //   - hash/CRC them incrementally
} bc_line_payload_t;

typedef struct {
  uint8_t cmd;
  uint32_t present_mask;
  bc_field_t fields[32];

  // Optional: store 0..N payloads per line (many streams will use 0 or 1).
  bc_line_payload_t payloads[4];
  uint8_t payload_count;
} bc_line_t;
```

Design note: the reducer and numeric accessors in this interpretation API operate solely on fields + qualifiers.
If your application needs payloads, latch them alongside the line as shown above, and handle them in your own layer.

#### 12.6.3 Canonical payload capture (opaque, line-associated)

Payloads are **associated with the line**, but their contents are opaque to the syntax parser.
The consumer (API user) decides how to interpret payload bytes. The following adapter pattern buffers
at most one payload per line (policy: *last payload wins*). Other policies (first wins, error on multiple)
are valid local choices.

```text
typedef enum { PL_NONE=0, PL_STRING=1, PL_HEX=2, PL_RAW=3 } payload_kind_t;

typedef struct {
  payload_kind_t kind;
  bool     len_hint_present;
  uint64_t len_hint;

  // Body bytes (opaque). For string payloads, this excludes the LF/NUL terminator.
  uint8_t *buf;
  size_t   len;
  size_t   cap;

  // String-only metadata
  bool     str_is_null;   // true only for NUL-terminated length-0 string payload
  uint8_t  str_term;      // 0x0A or 0x00
} line_payload_t;

static void payload_reset(line_payload_t *P) { P->kind=PL_NONE; P->len_hint_present=false; P->len_hint=0; P->len=0; P->str_is_null=false; P->str_term=0; }

static bool payload_reserve(line_payload_t *P, size_t want) {
  if (want <= P->cap) return true;
  size_t ncap = (P->cap ? P->cap : 64);
  while (ncap < want) ncap *= 2;
  uint8_t *nb = (uint8_t*)realloc(P->buf, ncap);
  if (!nb) return false;
  P->buf = nb; P->cap = ncap;
  return true;
}

// on_payload_*_begin: start a new payload for the current line.
on_payload_string_begin(len_present, len) {
  payload_reset(&line.payload); // last-wins policy
  line.payload.kind = PL_STRING;
  line.payload.len_hint_present = len_present;
  line.payload.len_hint = len;
  if (len_present) payload_reserve(&line.payload, (size_t)len);
}

on_payload_hex_begin(len_present, len) {
  payload_reset(&line.payload);
  line.payload.kind = PL_HEX;
  line.payload.len_hint_present = len_present;
  line.payload.len_hint = len;
  if (len_present) payload_reserve(&line.payload, (size_t)len);
}

on_payload_raw_begin(len) {
  payload_reset(&line.payload);
  line.payload.kind = PL_RAW;
  line.payload.len_hint_present = true;
  line.payload.len_hint = len;
  payload_reserve(&line.payload, (size_t)len);
}

on_payload_byte(b) {
  // Append opaque bytes.
  if (!payload_reserve(&line.payload, line.payload.len + 1)) { /* OOM policy */ }
  line.payload.buf[line.payload.len++] = b;
}

// on_payload_string_end(term, is_null, len_present, expected, actual, match)
on_payload_string_end(term, is_null, ...) {
  line.payload.str_term = term;
  line.payload.str_is_null = is_null;
}

// on_payload_hex_end(...)
on_payload_hex_end(...) { /* no extra metadata */ }

// on_payload_raw_end(...)
on_payload_raw_end(...) { /* no extra metadata */ }
```

With the canonical parser rules, a payload’s bytes are complete before the command terminator that latches the line.
If a payload is unterminated (e.g., missing LF for a string), the line never latches.

#### 12.6.4 Handling syntax errors (resync)

On any parse error, the canonical parser enters resynchronization mode and discards bytes until the next CMD.
When using a buffered line/payload adapter, this means **discarding** the current line buffer.

```text
// Optional: called once per syntax error when resync begins.
on_parse_error(code, offending_byte, state, a, b) {
  payload_reset(&line.payload);
  line.present_mask = 0;
  zero(line.fields);
  // remain in "waiting for latch" mode until the parser naturally resumes after next CMD
}
```

The parse error `code` is a `bc_parse_error_t` value (stable in the reference parser).

| Code | Value | Notes |
| --- | --- | --- |
| `BC_PE_SYNTAX` | 0 | Generic malformed input |
| `BC_PE_OVERFLOW` | 1 | Numeric accumulator overflow |
| `BC_PE_HEX_PAYLOAD_ODD_NIBBLE` | 2 | `%...%` ended mid-byte |
| `BC_PE_HEX_PAYLOAD_BAD_HEX` | 3 | Bad hex digit in `%...%` (incl lowercase) |
| `BC_PE_PAYLOAD_HINT_MISMATCH` | 4 | Hinted length mismatch (string or hex) |
| `BC_PE_HEX_LITERAL_BAD_HEX` | 5 | Bad hex digit in `#...#` (lowercase) |
