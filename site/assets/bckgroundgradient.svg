<svg xmlns="http://www.w3.org/2000/svg" width="100%" height="100%" preserveAspectRatio="none" viewBox="0 0 1600 600">
  <defs>
    <!-- Background Gradient: Dark Purple to Light Purple -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#3a00b8" />
      <stop offset="100%" stop-color="#b782ff" />
    </linearGradient>
    
    <!-- Text Gradient: Inverted (Light Purple to Dark Purple) -->
    <linearGradient id="txt-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#b782ff" />
      <stop offset="100%" stop-color="#3a00b8" />
    </linearGradient>

    <!-- Bloom filter -->
    <filter id="bloom" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3.5" result="blur" />
      <feComponentTransfer in="blur" result="glow">
        <feFuncA type="linear" slope="2.0"/>
      </feComponentTransfer>
      <!-- Merge the glow with itself to intensify if needed, or just output glow -->
    </filter>

