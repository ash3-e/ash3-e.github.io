const tagColors = {
  "Best Value": { bg:"#065f46", text:"#d1fae5" },
  "Move-In Special": { bg:"#92400e", text:"#fef3c7" },
  "Popular": { bg:"#7c3aed", text:"#ede9fe" },
  "Luxury": { bg:"#1e1b4b", text:"#e0e7ff" },
  "Specials": { bg:"#9d174d", text:"#fce7f3" },
  "Frick Park": { bg:"#155e75", text:"#cffafe" },
  "2 Bath": { bg:"#3730a3", text:"#e0e7ff" }
};

function Select(props) {
  return e("select", {
    value: props.value,
    onChange: function(ev) { props.onChange(ev.target.value); },
    style: { marginLeft:6, background:"#1f1c17", color:"#e8e4de", border:"1px solid #3d362c", borderRadius:4, padding:"5px 8px", fontSize:12, fontFamily:"inherit" }
  }, props.children);
}

function App() {
  const [sortBy, setSortBy] = useState("sqft");
  const [maxRent, setMaxRent] = useState(3100);
  const [availFilter, setAvailFilter] = useState("all");
  const [petsOnly, setPetsOnly] = useState(false);
  const [hoverId, setHoverId] = useState(null);

  const sorted = useMemo(function() {
    var filtered = apartments.filter(function(a) { return a.rent[0] <= maxRent; });
    if (availFilter === "now") filtered = filtered.filter(function(a) { return a.available === "Now"; });
    if (availFilter === "summer") filtered = filtered.filter(function(a) { return a.availSort >= 2 && a.availSort <= 4; });
    if (petsOnly) filtered = filtered.filter(function(a) { return a.pets; });
    return filtered.sort(function(a, b) {
      if (sortBy === "sqft") return a.sqft - b.sqft;
      if (sortBy === "sqft_desc") return b.sqft - a.sqft;
      if (sortBy === "rent") return a.rent[0] - b.rent[0];
      if (sortBy === "available") return a.availSort - b.availSort;
      return 0;
    });
  }, [sortBy, maxRent, availFilter, petsOnly]);

  var avgRent = sorted.length ? Math.round(sorted.reduce(function(s,a){return s+a.rent[0];},0)/sorted.length) : 0;
  var avgSqft = sorted.length ? Math.round(sorted.reduce(function(s,a){return s+a.sqft;},0)/sorted.length) : 0;

  return e("div", { style:{ minHeight:"100vh" } },
    // Header
    e("div", { style:{ background:"linear-gradient(135deg,#1a1814 0%,#2d261e 50%,#1a1814 100%)", borderBottom:"1px solid #3d362c", padding:"32px 24px 24px" } },
      e("div", { style:{ maxWidth:900, margin:"0 auto" } },
        e("div", { style:{ display:"flex", alignItems:"baseline", gap:12, flexWrap:"wrap" } },
          e("span", { style:{ fontSize:11, letterSpacing:4, textTransform:"uppercase", color:"#a08c6e", fontFamily:"'Helvetica Neue',sans-serif" } }, "Pittsburgh"),
          e("span", { style:{ color:"#3d362c" } }, "\u2022"),
          e("span", { style:{ fontSize:11, letterSpacing:4, textTransform:"uppercase", color:"#a08c6e", fontFamily:"'Helvetica Neue',sans-serif" } }, "15217 / 15232")
        ),
        e("h1", { style:{ fontSize:"clamp(28px,5vw,42px)", fontWeight:400, margin:"8px 0 4px", letterSpacing:-0.5, color:"#f5f0e8", lineHeight:1.1 } }, "Squirrel Hill"),
        e("p", { style:{ fontSize:15, color:"#a08c6e", margin:"2px 0 16px", fontStyle:"italic" } }, "2-Bedroom Apartments \u2014 Available through August 2026"),
        e("div", { style:{ display:"flex", gap:8, fontSize:11, fontFamily:"'Helvetica Neue',sans-serif", color:"#8a7e6e", flexWrap:"wrap" } },
          e("span", { style:{ background:"#1f1c17", padding:"4px 10px", borderRadius:4, border:"1px solid #2d261e" } }, sorted.length + " listings"),
          e("span", { style:{ background:"#1f1c17", padding:"4px 10px", borderRadius:4, border:"1px solid #2d261e" } }, "Avg $" + avgRent + "/mo"),
          e("span", { style:{ background:"#1f1c17", padding:"4px 10px", borderRadius:4, border:"1px solid #2d261e" } }, "Avg " + avgSqft + " sq ft")
        )
      )
    ),

    // Controls
    e("div", { style:{ background:"#141210", borderBottom:"1px solid #2d261e", padding:"14px 24px", position:"sticky", top:0, zIndex:10 } },
      e("div", { style:{ maxWidth:900, margin:"0 auto", display:"flex", gap:12, flexWrap:"wrap", alignItems:"center", fontFamily:"'Helvetica Neue',sans-serif", fontSize:12 } },
        e("label", { style:{ color:"#8a7e6e" } }, "Sort ",
          e(Select, { value:sortBy, onChange:setSortBy },
            e("option", { value:"sqft" }, "Sq Ft \u2191"),
            e("option", { value:"sqft_desc" }, "Sq Ft \u2193"),
            e("option", { value:"rent" }, "Rent (Low \u2192 High)"),
            e("option", { value:"available" }, "Move-In Date")
          )
        ),
        e("label", { style:{ color:"#8a7e6e" } }, "Max Rent ",
          e(Select, { value:maxRent, onChange:function(v){setMaxRent(Number(v));} },
            e("option", { value:1500 }, "$1,500"),
            e("option", { value:1800 }, "$1,800"),
            e("option", { value:2000 }, "$2,000"),
            e("option", { value:2500 }, "$2,500"),
            e("option", { value:3100 }, "No Max")
          )

        e("label", { style:{ color:"#8a7e6e" } }, "Availability ",

        )
      )

    // Listings
    e("div", { style:{ maxWidth:900, margin:"0 auto", padding:"20px 24px 60px" } },

        var isHover = hoverId === apt.id;
        return e("div", {

          style: { background:"linear-gradient(180deg,#1a1814 0%,#161310 100%)", border:"1px solid " + (isHover ? "#5c4f3a" : "#2d261e"), borderRadius:8, marginBottom:14, overflow:"hidden", transition:"border-color 0.2s" },

          onMouseLeave: function(){setHoverId(null);}
        },
          e("div", { style:{ display:"flex", flexWrap:"wrap" } },
            // Sq ft badge
            e("div", { style:{ width:90, minHeight:120, background:"linear-gradient(180deg,#2d261e 0%,#1f1c17 100%)", display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", borderRight:"1px solid #2d261e", flexShrink:0 } },
              e("span", { style:{ fontSize:26, fontWeight:300, color:"#f5f0e8", lineHeight:1 } }, apt.sqft.toLocaleString()),

            ),
            // Main content
            e("div", { style:{ flex:1, padding:"16px 20px", minWidth:0 } },
              e("div", { style:{ display:"flex", alignItems:"flex-start", justifyContent:"space-between", gap:8, flexWrap:"wrap" } },
                e("div", null,

                    e("h2", { style:{ fontSize:18, fontWeight:400, margin:0, color:"#f5f0e8" } }, apt.name),
                    apt.tag && e("span", { style:{ fontSize:9, letterSpacing:1.5, textTransform:"uppercase", fontFamily:"'Helvetica Neue',sans-serif", padding:"2px 8px", borderRadius:3, background:(tagColors[apt.tag]||{}).bg||"#333", color:(tagColors[apt.tag]||{}).text||"#ccc", fontWeight:600 } }, apt.tag)
                  ),
                  e("p", { style:{ fontSize:12, color:"#8a7e6e", margin:"3px 0 0", fontFamily:"'Helvetica Neue',sans-serif" } }, apt.address)
                ),
                e("div", { style:{ textAlign:"right", flexShrink:0 } },
                  e("div", { style:{ fontSize:20, fontWeight:300, color:"#f5f0e8" } },
                    "$" + apt.rent[0].toLocaleString(),
                    apt.rent[1] !== apt.rent[0] ? e("span", { style:{ color:"#5c5449", fontSize:14 } }, " \u2013 $" + apt.rent[1].toLocaleString()) : null

                  e("span", { style:{ fontSize:10, color:"#6b6157", fontFamily:"'Helvetica Neue',sans-serif" } }, "/month")
                )
              ),
              // Details
              e("div", { style:{ display:"flex", gap:16, marginTop:12, fontSize:11, fontFamily:"'Helvetica Neue',sans-serif", color:"#a08c6e", flexWrap:"wrap", alignItems:"center" } },
                e("span", { style:{ padding:"3px 9px", background:apt.available==="Now"?"#1a2e1a":"#1f1c17", border:"1px solid "+(apt.available==="Now"?"#2d5a2d":"#2d261e"), borderRadius:4, color:apt.available==="Now"?"#6bcb77":"#a08c6e", fontWeight:600 } },
                  apt.available === "Now" ? "\u2713 Available Now" : "Move-in: " + apt.available
                ),
                e("span", null, apt.beds + " Bed / " + apt.baths + " Bath"),
                apt.pets && e("span", { style:{ color:"#8a7e6e" } }, "\uD83D\uDC3E Pets OK"),
                e("span", { style:{ color:"#5c5449" } }, "|"),
                e("span", { style:{ color:"#6b6157" } }, apt.phone)
              ),
              // Amenities
              e("div", { style:{ display:"flex", gap:6, marginTop:10, flexWrap:"wrap" } },
                apt.amenities.map(function(a) {
                  return e("span", { key:a, style:{ fontSize:10, fontFamily:"'Helvetica Neue',sans-serif", color:"#6b6157", background:"#141210", padding:"2px 7px", borderRadius:3, border:"1px solid #23201b" } }, a);
                })
              )
            )
          ),
          // Footer
          e("div", { style:{ borderTop:"1px solid #23201b", padding:"8px 20px", display:"flex", justifyContent:"flex-end" } },
            e("a", { href:apt.url, target:"_blank", rel:"noopener noreferrer", style:{ fontSize:11, fontFamily:"'Helvetica Neue',sans-serif", color:"#a08c6e", textDecoration:"none", letterSpacing:1, textTransform:"uppercase" } }, "View Listing \u2192")
          )
        );
      }),

      // Disclaimer
      e("div", { style:{ marginTop:32, padding:"20px 0", borderTop:"1px solid #2d261e", fontSize:11, color:"#5c5449", fontFamily:"'Helvetica Neue',sans-serif", lineHeight:1.6 } },
        e("p", null, "Listings compiled from Apartments.com, Homes.com, and Walnut Capital as of April 2026. Prices, availability, and square footage are approximate and subject to change. Contact each property directly to confirm current availability and schedule a tour.")
      )
    )

}
