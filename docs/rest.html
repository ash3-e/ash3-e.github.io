# BCODe.rest 窶・Process Control Convention over BCODe Streams (Draft)
**Document date:** 2026-02-10  
**Status:** Draft convention (built on BCODe syntax + interpretation + BCODe.meta)
**Revision:** v6.1.3 (v6.1.2 + align `<c` unsolicited follow-ons with updated BCODe.meta session semantics)

BCODe.rest (formerly PCOB) is a convention for forming simple telemetry statements and control operations.
It is *REST-inspired* in the **Representation State Transfer** sense, but is designed for **streams**
(serial ports, TCP, WebSockets), not intermittent HTTP packets.

BCODe.rest composes:
- **BCODe syntax** (line/field grammar)
- **BCODe interpretation** (qualifiers, quality-first accessors)
- **BCODe.meta** (responses, unsolicited updates, batching, sequencing, reset)

---

## 1. Resources are the semantic anchor

BCODe.rest is resource-oriented. The **resource ID** is fundamental to decoding the meaning of BCODe.rest lines.

### 1.1 Resource ID format (64-bit)
The resource ID is the integer part of the command field:

- upper 32 bits: **IANA PEN** (namespacing by entity)
- lower 32 bits: resource identifier within that namespace

### 1.2 Publishing rule (industrial-grade interoperability)
Any party that publishes a BCODe.rest specification intended for third-party use MUST:
- obtain an IANA PEN, and
- place it in the upper 32 bits of all published resource IDs.

### 1.3 PEN=0 means 窶彗d-hoc窶・A PEN value of **0** designates a resource ID as **ad-hoc**:
- the meaning is not discoverable via registry lookup,
- and requires full contextual information (local docs, source, out-of-band agreement).

This is intentional to streamline tinkering, prototypes, and early development.

### 1.4 Appropriated defunct PENs (TBD standard resources)
IANA PEN numbers **5, 6, 7, 8** are assigned to defunct entities and are appropriated by convention
for future **standard resource definitions (TBD)**.

---

## 2. Resource lookup (discovery)

When a user encounters an unknown resource ID, the upper 32-bit PEN can be used as a discovery hook:

1) Extract upper 32-bit PEN  
2) Look up the PEN in the IANA PEN registry  
3) Extract a domain name from the registry contact email (substring after `@`)  
4) Fetch a discovery endpoint:

```text
https://<domain>/BCODe.rest/lookup.json
```

Format is TBD, but the goal is that an AI (or a tool) can fetch a structured map that describes:
- resource IDs and their record layouts,
- parameter meanings (`A`..`Z`) for those resources,
- command meanings and examples,
- and units/ranges if applicable.

**Recommendation:** cache lookup results and pin by version/hash for reproducibility.

---

## 3. Indexing (`@`)

The `@` parameter identifies a particular instance of a resource within a system.

- integer part: instance index (0,1,2,窶ｦ)
- fractional part (optional): additional hierarchy level (application-defined)

Example:
```bcode
0@   1@   2@
```

---

## 4. Command letters (operation categories)

BCODe.rest uses the lowercase command letter to identify an operation category.

Current reserved set (summary):

### 4.1 Reads
- `a` 窶・read **dynamic** dataset (idempotent; may be stale)
- `e` 窶・read **static** dataset (idempotent; cacheable during resource lifetime; never stale)

### 4.2 Data mutation
- `b` 窶・**stored data** update/readback (idempotent; PUT-ish)
  - `<b` = update stored/initialized values using supplied parameters (atomic)
  - `>b` = return previously written or initialized values
- `d` 窶・**delta change** to stored data (non-idempotent; atomic; quantized to closest realizable; rejects out-of-range)

### 4.3 Actions
- `c` 窶・**control action** with side effects (non-idempotent)
  - `<c` = execute action
  - `>c` = admission-check only (NOP; same response as `<c`)

### 4.4 Other reserved categories
- `f` 窶・data feeds and logged events (streaming + buffered playback + release)
- `i` 窶・allocate/deallocate (may be multi-response)

Other command letters are reserved.

---

## 5. Field model, `lookup.json`, and quality/diagnostics

### 5.1 `lookup.json` is authoritative for field layout
For a given `(RID, N)` and operation category (`a`, `e`, `b`, `d`, `c`, `f`, `i`), `lookup.json` defines:

- which **parameters** may appear in requests and responses,
- the meaning and type of each field, and
- any enumerations (including per-field diagnostic codes, if used).

### 5.2 Field presence rule (unsupported vs supported-but-unavailable)
For response datasets that return fields (`a`, `e`, `>b`, and any response datasets defined for `c`/`d`):

1) **Unsupported field**  
   If the device does not support a field at all, the field **MUST NOT** appear in the response.

2) **Supported field**  
   If the device supports the field, then the field **MUST** appear in the response as either:
   - a **normal value**, or
   - a **nonstandard (diagnostic) value-kind**, optionally with a diagnostic code.

This makes 窶徙mitted窶・unambiguous: omitted == unsupported.

### 5.3 Diagnostic value-kinds and optional diagnostic codes
If a supported field cannot be returned as a normal value (unknown, pending, invalid, not yet initialized, etc.),
the responder MUST return a **diagnostic value-kind** for that parameter (as defined by BCODe interpretation).

If the implementation can provide a specific reason, it MAY attach a **nonnegative integer diagnostic code**
(meaning defined in `lookup.json` for that `(RID,N,field)`).

Receivers MUST treat unknown diagnostic codes as opaque integers.

### 5.4 Stale modifier `!`
The stale modifier `!` is an orthogonal qualifier defined by BCODe interpretation.

BCODe.rest constrains when stale is allowed:

- **Allowed on parameter fields:** `a` (dynamic read)
- **Forbidden on parameter fields:** `e` (static read)
- **Recommended forbidden on parameter fields:** `b` and `d` (stored-state operations), unless `lookup.json` explicitly states otherwise.
- **Allowed on the *command field* (statement-level) for feeds only:** unsolicited `f` and unsolicited `>f` MAY use `!` on the command field to signal global buffer pressure, and MUST use it under the global-saturation condition defined in ﾂｧ8.6.6.1 (see ﾂｧ8.6.6).

Unless explicitly defined by this specification, `!` on a command field is undefined and SHOULD be ignored by receivers.

### 5.5 Feed-status command qualifiers `!` and `?`
For unsolicited feed statements (`f` and `>f`), BCODe.rest defines two **statement-level** qualifiers that MUST be attached
to the **command field**, not to any parameter field:

- **`!` on the command field** 窶・the device is in a *global buffer-saturated* state (see ﾂｧ8.6.6.1).
- **`?` on the command field** 窶・the specific resource has experienced *buffer overflow data loss* (see ﾂｧ8.6.6.2).

These qualifiers MAY appear together on the same command field. When both are present, the recommended order is `!?`
(e.g., `!?#...f`), but receivers SHOULD accept either order.

These meanings apply **only** to the command field of unsolicited feed statements. On parameter fields, `?` retains its normal
BCODe interpretation meaning (unknown/diagnostic value-kind).

---

## 6. Sequences and ordinals (`N`, `/R`, `*R`)

### 6.1 Command sequence `N`
The fractional portion of the command field is the **command sequence number** `N`.

`N` selects the dataset/stage the command refers to. BCODe.rest deliberately uses `N` as a stable selector
so the meaning of `A..Z` does not need to change when the protocol evolves.

### 6.2 Request ordinal `R` via `/R` (requests only)
BCODe syntax supports an exponent suffix (`*` or `/`) on a number field. In BCODe.rest, the divisor suffix `/R`
on the **command field** is reserved for **request-line ordinals** within a `[`-batched multiline request packet.

- `R` is a nonnegative integer identifier; treat its digits as an identifier (not float math).
- Implementations MUST NOT use `*R` on request lines.

Rules:
- For single-line requests, `/0` is implied and MAY be omitted.
- For multiline request packets, every line MUST include `/R`, and all `/R` values within the packet MUST be distinct.
- `/R` values SHOULD be contiguous starting at 0 (`/0`, `/1`, ...). Devices MAY reject non-contiguous ordinals as malformed.
- Parameter meaning MUST NOT depend on the `[` framing line index; it depends on `(RID,@,N,command letter, verb qualifier, /R)`.

### 6.3 Response ordinal `R` via `*R` (responses only)
The exponent suffix `*R` on the command field is reserved for **responses** (direct responses `^` or `\`, and unsolicited follow-ons `^\`):

- `R` is a response ordinal identifier associated with request sequence `N`.
- Implementations MUST NOT use `/R` on response lines.

This is intentionally designed so that:
- you can add additional response datasets later without shifting `N`, and
- response meaning does not depend on whether `[` batching is used.

### 6.4 Response ordinal rules
- The direct response to a request MUST use `*0`.
- If the direct response is multiline, it MUST be batched with `[` and MUST use distinct ordinals `*0`, `*1`, `*2`, 窶ｦ across its lines.
- Later updates are **unsolicited** (see ﾂｧ7) and may use any ordinal value.

### 6.5 Ordinal repetition (progress / updates)
`*R` MAY repeat to represent incremental updates for the same stage.

Example: progress updates at ordinal 2:
```bcode
^\ 30A 0.1*2c ; 30 percent complete (example dataset)
^\ 35A 0.1*2c ; 35 percent complete
```

Receivers MAY treat repeated `(N,R)` updates as 窶徑atest wins窶・ using timestamps and/or `]` sequencing to order.

---

## 7. Response vs unsolicited (BCODe.meta composition)

BCODe.rest relies on BCODe.meta to distinguish:
- direct responses (`^` or `\`), versus
- unsolicited follow-ons (`^\`).

### 7.1 Direct response MUST be immediate and tagged
The immediate response to a command MUST be a **response line** (BCODe.meta):

- `^` for affirmative acknowledgement (accepted), or
- `\` for negative acknowledgement (rejected; may include an error/reason code).

The response MAY carry data if the result is immediately available.
If multiple lines are needed immediately, the response MUST be batched using `[`.

### 7.2 Delayed results are unsolicited and MUST include `\`
If the 窶徨eal result窶・arrives later (async completion), it is not a direct response;
it is an unsolicited statement and MUST include both `^` and `\` (i.e., `^\`).

Delayed results MAY be batched with `[`.


### 7.3 Multiline requests (atomic delivery)
Any BCODe.rest request MAY be delivered as a `[`-batched multiline packet per BCODe.meta.

The `[` line numbering (e.g., `1.3[` / `2.3[`) is **framing only** and MUST NOT change parameter interpretation.

For a multiline request packet:

- All lines MUST have the same **base command identity** (same RID, command sequence `N`, command letter, and `<`/`>` qualifier, if any).
- Each line MUST include a **request ordinal** `/R` on the command field (ﾂｧ6.2).
  - All `/R` values within the packet MUST be **distinct**.
  - `/R` values SHOULD be contiguous starting at 0 (`/0`, `/1`, 窶ｦ). Devices MAY reject non-contiguous ordinals as malformed.
- Selector parameters such as `@` and (for controls) `]` MUST be present and identical across all lines.
- Any non-selector (payload) parameter letter MUST NOT appear more than once across the packet; duplicates make the request malformed.
  - Selector parameters such as `@` and (for controls) `]` MAY repeat across lines, but their value-kind and digits MUST be identical across the packet.

For `<b` and `d`, a multiline request packet represents a single atomic update transaction: the device MUST either commit all supplied updates as one unit or reject the request (no changes applied).

#### 7.3.1 Illustrative examples

The following examples show request packets that are split across multiple lines but evaluated as a **single** logical request.

##### Example A 窶・fixed-bound two-line `<b` UPDATE (one atomic commit)

Controller updates four stored fields (`A`, `B`, `C`, `D`) in one transaction:

```bcode
; Multiline request packet (fixed-bound: i.t[ means "line i of t")
1.2[ 0@ < 50A 100B #07 03020501#.0/0b
2.2[ 0@ < 25C 0D   #07 03020501#.0/1b

; Direct response (example): accepted, and echoes resulting stored values
^ 1.2[ 0@ 50A 100B #07 03020501#.0*0b
^ 2.2[ 0@ 25C 0D   #07 03020501#.0*1b
```

Notes:
- The device MUST NOT apply `A`/`B` after receiving line 1. It applies **everything** after validating the whole packet.
- Any failure (e.g., `C` invalid) rejects the **entire** `<b` update.

##### Example B 窶・open-ended `<b` UPDATE (length not known until the end)

Open-ended batching lets a controller stream a packet without knowing the total line count up front.
The packet is closed by a final fixed-bound line `i.t[`:

```bcode
; Open-ended request packet (unknown total until closed)
>1[ 0@ < 50A  #07 03020501#.0/0b
>2[ 0@ < 100B #07 03020501#.0/1b
>3[ 0@ < 25C  #07 03020501#.0/2b
4.4[ 0@ < 0D   #07 03020501#.0/3b

; Direct response (example): accepted
^ 0@ #07 03020501#.0*0b
```

Notes:
- The device MUST buffer (or otherwise defer execution) until the closing `i.t[` line arrives.
- If any line is missing or the counters are inconsistent, the request is malformed and MUST be rejected (no changes applied).

##### Example C 窶・fixed-bound three-line `d` delta update (one atomic commit)

Controller requests incremental changes to three stored values:

```bcode
; Multiline delta request packet (atomic)
1.3[ 0@ +5A   -2B  #07 03020501#.0/0d
2.3[ 0@ +0.5C      #07 03020501#.0/1d
3.3[ 0@ -10D       #07 03020501#.0/2d

; Direct response (example): accepted and reports resulting absolute values
^ 1.2[ 0@ 55A  98B  #07 03020501#.0*0d
^ 2.2[ 0@ 10.5C     #07 03020501#.0*1d
```

Notes:
- The device applies **closest realizable** deltas where needed, but if the resulting value would violate bounds, it MUST reject the entire packet.
- The response shape is lookup-defined; this example shows absolute results but it may also include applied deltas.

##### Example D 窶・multiline `<c` control with required `]` (selectors must match)

A control has many parameters, so the controller splits them across lines. The `]` control sequence identifier MUST appear on every line and MUST match:

```bcode
; Execute control (multiline). S=42 in the request.
42] 1.2[ 0@ < 1A 10T #07 03020501#.0/0c
42] 2.2[ 0@ < 3B    #07 03020501#.0/1c

; Direct response (example): accepted, device echoes ".42" in its ] field
7.42] ^ 0@ 1A 10T 3B #07 03020501#.0*0c

; Later unsolicited progress/completion updates (allowed only for <c) are in-session (`ﾎ.42]`); the final one ends the session (`!ﾎ.42]`).
9.42] ^\ 0@ 50P #07 03020501#.0*1c
!10.42] ^\ 0@ 100P #07 03020501#.0*1c
```

##### Example E 窶・malformed multiline `<b` due to duplicate payload parameter

Here the payload parameter `A` appears twice across the packet, which is ambiguous. The device MUST reject and apply nothing:

```bcode
1.2[ 0@ < 50A  #07 03020501#.0/0b
2.2[ 0@ < 51A  #07 03020501#.0/1b  ; ERROR: duplicate payload parameter A

; Direct response (example): reject (no changes applied)
-98.1\ 0@ #07 03020501#.0*0b
```

##### Example F 窶・malformed multiline request due to selector mismatch

Selector parameters must be identical across all lines. If they differ, the packet is malformed:

```bcode
; ERROR: @ differs across lines
1.2[ 0@ < 50A  #07 03020501#.0/0b
2.2[ 1@ < 100B #07 03020501#.0/1b

; Reject (example)
-98.1\ 0@ #07 03020501#.0*0b
```

##### Example G 窶・malformed multiline `<c` due to `]` mismatch

```bcode
; ERROR: ] differs across lines
7] 1.2[ 0@ < 1A #07 03020501#.0/0c
8] 2.2[ 0@ < 2B #07 03020501#.0/1c

; Reject (example)
-99.1\ 0@ #07 03020501#.0*0c
```

##### Example H 窶・malformed multiline request due to missing `/R`

If any line in a multiline request omits `/R`, the packet is malformed (because parameter interpretation would depend on framing order):

```bcode
; ERROR: no /R in the command field
1.2[ 0@ < 50A  #07 03020501#.0b
2.2[ 0@ < 100B #07 03020501#.0b

; Reject (example)
-98.1\ 0@ #07 03020501#.0*0b
```

## 8. Operation semantics

### 8.1 Dynamic read (`a`)
Dynamic reads are **idempotent** reads of the dynamic dataset for `(RID,@,N)`.

#### 8.1.1 Staleness is allowed
Dynamic read responses MAY include stale values for supported fields. Stale is indicated using the stale modifier `!`.

Dynamic read responses MAY mix:
- fresh values,
- stale values,
- diagnostic value-kinds, and
- omitted fields (unsupported only).

#### 8.1.2 Failure model
A dynamic read request SHOULD be accepted (`^`) if the request is valid, even if some or many fields are returned diagnostically.

Request-level failures MUST be rejected (`\`) with an `a`-group error code (see ﾂｧ11).

---

### 8.2 Static read (`e`)
Static reads are **idempotent** reads of the static dataset for `(RID,@,N)` and are cacheable during the resource lifetime.

#### 8.2.1 Staleness is forbidden
Static read responses MUST NOT mark any returned field as stale (MUST NOT use `!`).

If a supported static field cannot be returned as a normal value, the responder MUST return a diagnostic value-kind
(optionally with a diagnostic code), not a stale value.

---

### 8.3 Stored data update/readback (`b`) 窶・idempotent

`b` represents idempotent operations over **stored or initialized** values associated with `(RID,@,N)`.

#### 8.3.1 `>b` READBACK
`>b` returns previously written or initialized values for supported fields defined by `lookup.json`.

- Unsupported fields MUST be omitted.
- Supported fields MUST be returned as a value or a diagnostic value-kind (e.g., 窶從ot yet initialized窶・, optionally with a diagnostic code.
- `>b` SHOULD NOT use the stale modifier `!`.

#### 8.3.2 `<b` UPDATE (PUT-ish)
`<b` updates stored/initialized values using the supplied parameters.

**Omitted fields are not updated:**  
If a parameter field is absent from the `<b` request, it MUST NOT be modified.

**Atomicity (never partial):**  
`<b` updates are atomic. The device MUST commit **all** supplied parameter updates or **none**.

**Required parameters:**  
`lookup.json` MAY require that a specific parameter be present for a particular `(RID,N)` update variant.  
If a required parameter is missing, the device MUST reject the update.

**Discouraged coupled presence:**  
A device MAY require parameters to appear in combination (e.g., `A` only valid with `B`), though this is discouraged.
If such a rule exists, it MUST be declared in `lookup.json`, and violations MUST reject the update.

**Lockout:**  
A device MAY lock out `<b` updates (temporary or permanent). When locked out, the device MUST reject the update.

**Response payload (recommended):**  
On acceptance, the direct response SHOULD include the resulting stored value(s) for the supplied parameters.
If the resulting values are not immediately available, the direct response MAY be a bare ACK, followed later by
unsolicited completion reporting using `^\` as required by ﾂｧ7.2.

---

### 8.4 Delta change to stored data (`d`) 窶・non-idempotent

`d` applies **incremental changes** to stored values without specifying exact absolute values.

- `d` is **not idempotent**.
- `d` updates are **atomic** (never partial), like `<b`.

#### 8.4.1 Relationship to `<b`
All `<b` update variants are *conceptually* expressible as `d` variants, but `d` support MAY be excluded:
- globally for a device,
- per `(RID,N)` variant, and/or
- per parameter, as declared by `lookup.json` and device behavior.

A device that does not support `d` for a requested target MUST reject the command with a `d`-group error.

#### 8.4.2 Delta meaning and forms
For parameters that support `d`, the supplied numeric value represents a **requested change**, not an absolute target.

Delta forms include:
- signed numeric deltas (e.g., +5, -0.25),
- epsilon changes (smallest realizable increment/decrement),
- suggested deltas (device may quantize to realizable steps).

Exact encoding rules are defined by BCODe numeric interpretation and constrained by `lookup.json`.

#### 8.4.3 Closest realizable change
If the device cannot apply the exact requested delta, it MUST apply the **closest realizable change**.
The applied delta becomes the effective change.

**Quantization vs saturation:**
The device determines the closest realizable change by quantizing the requested delta to a realizable increment for that parameter.
The device MUST NOT 窶徭aturate窶・or clamp a request that would exceed bounds by silently reducing the delta to fit within min/max.
After selecting the closest realizable change, if applying it would exceed a maximum or minimum or produce an invalid value, the request MUST be rejected and no values may change.

#### 8.4.4 Rejection rules (no changes applied)
A `d` request MUST be rejected (and MUST NOT change any values) if:
- the applied change would exceed a maximum or minimum,
- the resulting value would be invalid,
- the parameter does not support delta updates, or
- the update violates a declared constraint.

#### 8.4.5 Response payload (recommended)
On acceptance, the direct response SHOULD report the resulting absolute values of the modified fields and/or the applied deltas,
as defined by `lookup.json`. If completion is delayed, use `^\` follow-ons per ﾂｧ7.2.

---

### 8.5 Controls and actions (`c`) 窶・non-idempotent

`c` initiates, schedules, modifies, or terminates **actions with side effects**.

#### 8.5.1 Control action classes
A `c` control MAY represent one or more of the following action classes (as defined by `lookup.json` for `(RID,N)`):

1. **Instigation** 窶・cause something to happen (e.g., breaker trip)
2. **Latched action** 窶・latch output/state to a target state
3. **Timed latch** 窶・latch to a target state, then revert after a duration
4. **Mode change** 窶・start/stop a process; transition operational modes
5. **Termination** 窶・stop an action in process; cancel a scheduled action

Controls MAY be immediate or time-delayed, depending on parameters and `lookup.json`.

#### 8.5.2 Synchronous direct response is mandatory
Every `c` request MUST receive an immediate direct response indicating acceptance (`^`) or rejection (`\`).

This direct response indicates **acceptance/rejection of the control request**, not necessarily completion.

#### 8.5.3 Unsolicited progress/completion updates (BCODe.meta sessions)

After accepting a `<c` request, the device MAY emit unsolicited `^\` messages reporting:
- progress,
- state transitions,
- completion,
- cancellation, or
- failure.

Unsolicited updates MUST be correlatable to the control instance (see ﾂｧ8.5.6).

**BCODe.meta session binding (normative):**

BCODe.rest control follow-ons are **in-session unsolicited statements** as defined by BCODe.meta.

- A control follow-on session is keyed by the requester-provided control identifier `S` (the integer value in the request窶冱 `]` field).
- A device MUST NOT emit any control follow-ons for `S` unless it has first **started session `S`** by accepting the control request and returning an affirmative direct response whose `]` field carries the fractional discriminator `.S` (i.e., `ﾎ.S]`).
- While session `S` is active, any control follow-on:
  - MUST be tagged as unsolicited (`^\`),
  - MUST carry a `]` field whose fractional component equals `S` (i.e., `ﾎ.S]`), and
  - SHOULD use a primary sequence number `ﾎ` that increases monotonically.
- When the control reaches a terminal outcome (completed / cancelled / failed, lookup-defined), the device SHOULD end the session explicitly.
  - The **final** follow-on for session `S` MUST mark the `]` field stale to indicate end-of-session: `!ﾎ.S]`.

**Batching note (normative):**
Control follow-ons MAY be delivered as `[`-batched multiline packets. If batched, every line in the packet MUST be tagged `^\`
and MUST carry a `]` field whose fractional component equals `S` (i.e., `ﾎ.S]`).

If the **final** follow-on that ends session `S` is batched, the stale `!` MUST be applied to the `]` field of the **final line**
of the packet (so the session terminates after the entire atomic unit is received).

After a stale-terminated final follow-on (`!ﾎ.S] ^\ ... c`), the device MUST NOT emit additional `^\` lines labeled with `.S`.
Receivers will treat later `.S` lines as references to a non-existent session and (by default) drop them under the BCODe.meta rules.

#### 8.5.4 `<c` vs `>c` intent qualifiers
The command-field qualifier selects execution vs admission-check:

- `<c` 窶・**execute** the action (side effects permitted; unsolicited follow-ons permitted)
- `>c` 窶・**admission-check only** (guaranteed NOP; no side effects; unsolicited follow-ons forbidden)

#### 8.5.5 `<c` and `>c` equivalence constraints
`<c` and `>c` are equivalent in parameters and validation:

- **Parameter-equivalent:** The same parameters are sent and interpreted the same way.
- **Direct responses identical:** The direct response to `<c` and the direct response to the corresponding `>c`
  MUST be identical (same ACK/NAK and same payload fields, if any).

The **only** difference is that `>c` is guaranteed NOP and MUST NOT generate any unsolicited follow-on messages.

**Race note:** A `>c` acceptance means 窶忤ould accept now窶・ later `<c` execution may be rejected if device state changed.

#### 8.5.6 Required control sequence counter `]` and BCODe.meta session labeling

A control request (`<c` or `>c`) MUST include a sequence counter field `]` (request control identifier).

The request `]` value MUST be a **nonnegative integer identifier** (no sign and no fractional digits). The intent is that
its decimal digits can be echoed verbatim as the **BCODe.meta session discriminator** in accepted responses and follow-ons.

Let the requester-provided control identifier be `S` (the request `]` integer).

**Lexical rules:**
- `S` is an identifier. The requester SHOULD generate `S` as a monotonically increasing integer (wrap-around permitted).
- Requesters SHOULD avoid leading zeros. Responders echo the canonical decimal digits of `S` when forming `.S` in their `]` field.
- If a responder cannot echo all digits of `S` in the fractional portion of its `]` field, it MUST reject the control request as malformed.

**Uniqueness (single controller):**
BCODe.rest assumes a single controller per device. The controller MUST NOT reuse an `S` value while the corresponding
BCODe.meta session `S` may still be active (i.e., while follow-ons could still be emitted for that control).

- If the device ends the session explicitly using a stale-marked `]` follow-on (`!ﾎ.S]`), the controller MAY reuse `S`
  only after observing that termination.
- If the device does not end sessions explicitly, controllers MUST apply a conservative local policy (e.g., timeouts)
  before reusing `S` to avoid ambiguity.

**Direct response rules (normative):**

- **Accepted control:** The direct response MUST be affirmative (`^`) and MUST start BCODe.meta session `S` by including a `]`
  field whose fractional component equals `S` (i.e., `ﾎ.S]`).
  - If the direct response is multiline (batched with `[`), every line in the response packet MUST carry a `]` field whose fractional
    component equals `S` (i.e., `ﾎ.S]`).
- **Rejected control:** The direct response MUST be negative (`\`) and MUST NOT carry a fractional `]` component
  (i.e., it MUST NOT use `ﾎ.S]`).

**Follow-on rules (normative):**

For an accepted control whose direct response started session `S`:

- Any later unsolicited progress/completion/cancellation/failure message for that control MUST be sent as an in-session unsolicited
  statement (`^\`) carrying `] = ﾎ.S]` (fractional discriminator equals `S`).
- If a follow-on is multiline (batched with `[`), every line in the follow-on packet MUST carry a `]` field whose fractional component equals `S`.
- The **final** unsolicited statement for that control MUST mark the `]` field stale to indicate end-of-session: `!ﾎ.S]`.
  - If the final follow-on is multiline, the stale `!` MUST appear on the `]` field of the **final line** of that final packet.

**Note on `!`:**
The `!` used here is a stale qualifier on the **meta** `]` field (session termination). It is distinct from the BCODe.rest
command-field stale `!` used only for unsolicited feed buffer-saturation signaling (ﾂｧ8.6.6).

### 8.6 Data feeds and logged events (`f`)

The `f` category provides a unified model for:

- **live streaming feed data** (unsolicited push), and
- **buffered/logged event playback** (unsolicited push of historical records),
- with an explicit **release** mechanism so devices with finite buffers can discard delivered records safely.

There are three on-wire forms: `f`, `>f`, and `<f`.

### 8.6.1 Forms and roles

#### `f` (unqualified)
`f` is used in two roles:

1) **Requester-to-device command requests** that manage feeds and request playback.
2) **Device-to-requester unsolicited live feed updates** (streaming data).

#### `>f` (buffered playback)
`>f` is emitted by the device as **unsolicited buffered/logged records** (historical playback).
It is not used for requester-issued commands.

#### `<f` (release)
`<f` is a requester-issued command that **releases** buffered/logged records from device storage.
Release is referenced by the record identifier carried on the corresponding `f` / `>f` unsolicited records in the BCODe.meta `^` field (ﾂｧ8.6.3).

### 8.6.2 Unsolicited feed statements are correlated to `a` (dynamic read)

All unsolicited feed statements (`f` live updates and `>f` buffered playback) MUST correlate with the dynamic dataset accessible by
the `a` command:

- The `(RID,@,N)` tuple on an unsolicited feed statement identifies the same dataset addressed by an `a` read.
- Any parameter fields present in the feed statement MUST have the same meaning as the corresponding fields in the `a` dataset for that `(RID,@,N)`.
- Feed statements MAY contain a subset of fields (e.g., only changed values). Receivers MAY issue `a` reads to obtain a full snapshot.

In other words, unsolicited `f`/`>f` statements are a **push representation** of dynamic read data, not a separate schema.

### 8.6.3 Required record identifier in the `^` field

All unsolicited feed statements (both `f` and `>f`) MUST include a BCODe.meta `^` field.

If the device supports a per-record identifier, it MUST encode that identifier as the numeric value immediately preceding `^` (or `^\`).
This numeric value is the record identifier `K`.

- When present, `K` is the reference used by `<f` release commands.
- For a given feed stream identified by `(RID,@,N)`, the device MUST emit unsolicited feed records in a well-defined order for that stream.
  - In **timestamp mode** (ﾂｧ8.6.3.1), `K` MUST be **strictly increasing** in that transmission order.
  - In **event-identifier mode** (ﾂｧ8.6.3.2), `K` MUST uniquely identify retained records and continuity MUST be representable using the `(E,P)` rule.

A device MAY choose to make `K` monotonic across *all* feed streams as well, but this is not required.

`lookup.json` MUST document the meaning of `K` for each `(RID,@,N)` feed stream, including:
- timebase/units/epoch (if time-based),
- wrap/reset behavior, and
- whether event identifiers are stream-scoped or globally allocated.

#### 8.6.3.1 Timestamp mode (recommended: Unix Epoch)

In timestamp mode, `K` represents a time value (wall-clock, monotonic uptime, or boot-count+uptime) as documented in `lookup.json`.
Devices SHOULD synchronize to **Unix Epoch time** (e.g., seconds or milliseconds since 1970-01-01T00:00:00Z).

Most devices will not have an atomic clock; receivers SHOULD assume that timestamp accuracy depends on periodic external synchronization
(e.g., NTP, GPS) and/or an onboard RTC.

**Timestamp-quality qualifiers on the `^` field:**

- `?` 窶・**time convergence pending** (e.g., NTP convergence, GPS acquiring fix). `K` is monotonic, but wall-clock accuracy is not yet guaranteed.
- `-?` 窶・**time synchronization failed** (e.g., RTC lost time, time source unreachable). `K` is present, but accuracy may be poor or drifting.
- `?<>` 窶・**no time synchronization configured**. `K` is present but SHOULD be treated as a local monotonic timebase, not authoritative wall-clock.
- `!` 窶・**time possibly stale** (the synchronization interval has been exceeded; drift is possible).

**Rules:**
- A device in timestamp mode MUST ensure that `K` does not decrease for a given `(RID,@,N)` stream in the order records are transmitted.
  - If wall-clock time would step backward, the device MUST either delay emission, slew using a monotonic timebase, or switch to event-identifier mode (ﾂｧ8.6.3.2).
- `!` MUST NOT be combined with `?` or `?<>` on the same `^` field.
- A device MAY default its startup clock to Epoch 0 (common in embedded Linux). If doing so, it SHOULD tag `^` with `?`
  until synchronization is achieved.

##### 8.6.3.1.1 Boot-count + uptime model (limited devices)

Some devices cannot maintain wall-clock time across power loss, but can:
- count startups/resets using a persistent counter (e.g., stored in nonvolatile memory), and
- measure runtime while powered (uptime).

In this model, the `^` record identifier `K` is encoded as a **number pair**:

```bcode
B,U^
```

Where:
- `B` is a **boot sequence identifier** (a monotonically increasing counter across device startups; wrap-around permitted).
- `U` is the **uptime since that boot** in units documented in `lookup.json` (e.g., milliseconds).

**Rules:**
- For a given `(RID,@,N)` stream, successive `(B,U)` pairs in the order transmitted MUST be **strictly increasing** under lexicographic ordering:
  - `B2 > B1`, or
  - `B2 == B1` and `U2 > U1`.
- `B` MUST change when the device restarts (a new boot), and `U` MUST restart near 0 for that boot.
- Within a boot, `U` MUST be monotonic for the stream in transmission order.
- If the counter used for `U` may wrap during continuous operation, the device MUST prevent `K` from decreasing by either:
  - using a sufficiently wide uptime counter for the intended operational window, or
  - incrementing `B` when `U` wraps (treating wrap as a new boot epoch).

**Recommendation:**
- Devices using this model SHOULD tag the `^` field with `?<>` to indicate that no authoritative wall-clock synchronization is configured.

**Receiver guidance (non-normative):**
Receivers MAY correlate `(B,U)` to local time by recording the receiver's local time when a new `B` value is first observed and then
treating subsequent records for that same `B` as offset by `U`. Time while the device is powered off is not represented by this model.

#### 8.6.3.2 Event-identifier mode for timestamp-less buffered logs (`^!`)

A device that supports buffered/logged playback but cannot produce a usable timestamp MAY operate in **event-identifier mode**.

In this mode, the `^` field MUST be tagged with `!` and the numeric preceding `^` MUST be a **number pair**:

```bcode
!E,P^
```

Where:
- `E` is the identifier of the current event record.
- `P` is the identifier of the previous event record for the same `(RID,@,N)` stream at the time the record was created.

**Rules:**
- `E` and `P` are identifiers. Receivers MUST treat their digits as identifiers (not float math; not wall-clock time).
- `E` values SHOULD be unique among all currently retained records for that stream (and MAY be globally unique across streams).
- For a healthy continuous stream, each successive record SHOULD satisfy `P == E_prev`.
  - If the device knows records were discarded due to overflow, it MUST signal loss using the command-field loss qualifier `?` (ﾂｧ8.6.6.2).
- On the first record after a stream reset or at a buffer boundary where no previous record is available, the device MUST set `P == E` (self-reference).

**Restrictions:**
- `?`, `-?`, and `?<>` MUST NOT be used on the `^` field in this mode.

#### 8.6.3.3 Bare-`^` mode (no per-record identifier)

Devices that do not support any per-record identifier MAY emit the `^` field with no numeric value.

- Such statements are orderable only by transport sequence.
- Devices operating in this mode MUST NOT emit buffered playback statements (`>f`) and MUST reject `<f` release requests with `-102.4`
  (feed/log operation not supported for this `(RID,@,N)`; no releasable buffer exists).


### 8.6.4 Enabling and disabling streaming (requests using `f`)

Requester-issued `f` commands enable or disable streaming of unsolicited live feed data for a resource.

- The exact parameter set for enabling/disabling (and any rate, filter, or mode selection) is defined by `lookup.json`.
- Devices SHOULD support disabling a feed to reduce bandwidth and buffer pressure.

A successful enable does not imply that the device has buffered historical data; it only controls *future* live streaming.

### 8.6.5 Buffered playback and release

#### 8.6.5.1 Requesting playback of unreleased buffered data (requests using `f`)
A requester-issued `f` command MAY request the device to transmit any **unreleased buffered/logged** records for that resource.

- Transmission of buffered data is performed by emitting unsolicited `>f` statements.
- **Transmission does NOT imply release.** Buffered records remain stored until explicitly released by `<f`.

`lookup.json` MAY define parameters for requesting playback within a window, selecting a replay mode, or otherwise controlling replay.
The log stream itself is identified by the standard selectors `(RID,@,N)`.

#### 8.6.5.2 Buffered records (`>f`) are unsolicited and identified
All `>f` buffered records:
- MUST be sent as unsolicited statements (`^\`),
- MUST carry the required `^` record identifier (ﾂｧ8.6.3), and
- MUST use the same data field meanings as `a` (ﾂｧ8.6.2).

#### 8.6.5.3 Releasing buffered records (`<f`)

Release is the only mechanism by which the requester authorizes the device to discard buffered/logged records.
Devices MUST NOT treat 窶徭uccessfully transmitted窶・as 窶徨eleased窶・implicitly.

A requester releases buffered records by issuing a `<f` command that includes one or more **release selector** fields.

**BCODe.rest reserves parameter letters for `<f` release:**

- `A` 窶・the primary release selector (required for all `<f` release requests)
- `B` 窶・optional secondary selector (used only for range release; see ﾂｧ8.6.5.3.2)

`lookup.json` MUST NOT redefine `A` or `B` for `<f` release semantics. Additional parameters MAY be defined by `lookup.json`
for device-specific release modes, provided they do not change the interpretation of `A` and `B`.

The numeric value(s) carried on release selectors refer to record identifiers previously observed in the `^` field of unsolicited
feed records for the targeted `(RID,@,N)` stream (ﾂｧ8.6.3).

##### 8.6.5.3.1 Single-event release (happy path; required for `^!` timestamp-less logs)

In event-identifier mode (`^!`, ﾂｧ8.6.3.2), a requester releases a specific buffered record by including a selector in parameter `A`
of the form:

```bcode
!E,P  (carried in parameter `A`)
```

On-wire this is written as a single field whose label is `A`, e.g. `!1234,1233A`.

Rules:

1) **If event `E` is retained** for the targeted `(RID,@,N)` stream and any supplied preconditions are satisfied, the device MUST release that record and MUST respond with acceptance (`^`).

2) **If event `E` is not retained because it was already released**, the device MAY:
   - respond with acceptance (`^`) to preserve idempotent 窶彗lready done窶・semantics, or
   - reject with `-102.13` (Event not found / already released).

   If a device chooses one behavior, it MUST apply it consistently for that `(RID,@,N)` and document the behavior in `lookup.json`.

3) **If the request supplies `(E,P)` and the supplied `P` does not match** the retained metadata for event `E`, the device MUST reject with `-102.14` (Release precondition failed) and MUST NOT release any records.

4) **If the request does not uniquely identify a single release target** (malformed selector token, missing required `!` in event-identifier mode, or conflicting selectors), the device MUST reject with `-102.17`.

##### 8.6.5.3.2 Range release (optional optimization)

As an optimization, devices MAY support bulk release by identifier range.

- If supported, the requester specifies an upper bound using `A` and MAY specify a lower bound using `B`.
- The exact range model (inclusive/exclusive endpoints, allowed forms, and wrap behavior) MUST be documented in `lookup.json`.

If range release is not supported, the device MUST reject range-release requests with `-102.16` (Range release not supported).

##### 8.6.5.3.3 Retention-model safety

If the requested release would discard records outside the device窶冱 supported retention model, the device MUST reject the command (no changes applied) using `-102.11` (Release rejected).

### 8.6.6 Buffer pressure and data loss signaling on feed commands

To support robust loss detection with finite buffers, unsolicited feed statements MUST carry **command-field qualifiers** under
the conditions below.

**Important:** These qualifiers MUST be attached to the **command field**, not to any parameter field (ﾂｧ5.5).

#### 8.6.6.1 Global buffer saturation 竍・command-level stale `!`
If buffered data on **any** resource in the device has reached its **maximum buffer limit** (i.e., at least one buffer cannot accept more data),
then **all unsolicited `f` and all unsolicited `>f` statements** emitted by the device MUST bear the stale qualifier `!` on the command field.

- This `!` indicates the device is globally buffer-saturated and unsolicited feeds should be treated as potentially stale/at-risk.
- The `!` qualifier MUST NOT be cleared until **all buffers for all resources** have available capacity to buffer more data.

#### 8.6.6.2 Per-resource overflow discard 竍・command-level loss `?`
If buffered data for a **particular resource** was discarded due to overflow, then unsolicited feed statements for that resource MUST bear the
loss qualifier `?` on the command field:

- Applies to both unsolicited **live** feed statements (`f`) and unsolicited **buffered** playback statements (`>f`) for that resource.
- The `?` overflow/loss condition is **latched** and can only be cleared by a requester-issued `f` command that targets that resource
  (i.e., an explicit feed management request).

#### 8.6.6.3 Combined qualifiers
If both global saturation and per-resource loss apply, both qualifiers MUST be attached to the command field (e.g., `!?...f`).

### 8.6.7 Direct responses to feed commands
Direct responses to requester-issued `f` and `<f` commands follow normal BCODe.meta rules:

- accepted: `^`
- rejected: `\` with an error code

Unsolicited feed statements are not direct responses and MUST be emitted as `^\` statements (consistent with ﾂｧ7.2).

## 9. Worked examples

### 9.1 Immediate single-line ACK with data (read)
```bcode
; Request: dynamic read (a)
0@ #07 03 02 05 01#.0a

; Direct response (ACK + data), ordinal *0
1231211231^ 0@ 10A 3B #07 03020501#.0*0a
```

### 9.2 Immediate multiline ACK (atomic batch)
```bcode
; Request
0@ #07 03 02 05 01#.0a

; Direct response: 2-line packet, evaluated atomically
1231211231^ 1.2[ 0@ 10A 3B #07 03020501#.0*0a
1231211231^ 2.2[ 0@ 11A 4B #07 03020501#.0*1a
```

### 9.3 Direct ACK now, unsolicited completion later
```bcode
; Request
0@ #07 03 02 05 01#.0a

; Direct ACK
^ 0@ #07 03020501#.0*0a

; Later: unsolicited completion MUST include '\' (hence '^\')
1231211231^\ 0@ 10A 3B #07 03020501#.0*1a
```

### 9.4 `<b` atomic update (idempotent PUT-ish)
```bcode
; Request: update stored setpoints A and B (atomic)
0@ < 50A 100B #07 03020501#.0b

; Direct response: accepted, echo resulting stored values
^ 0@ 50A 100B #07 03020501#.0*0b
```

### 9.5 `d` delta update (non-idempotent)
```bcode
; Request: increase stored setpoint A by +5 (delta)
0@ +5A #07 03020501#.0d

; Direct response: accepted, device applied closest realizable change (+4.8)
^ 0@ 54.8A #07 03020501#.0*0d
```

### 9.6 `>c` admission check then `<c` execute, correlated by `]`
```bcode
; Preflight (NOP): would you accept this latch control now?
7] 0@ > 1A #07 03020501#.0c

; Direct response: identical shape to <c response
102.7] ^ 0@ 1A #07 03020501#.0*0c

; Execute (side effects permitted)
8] 0@ < 1A #07 03020501#.0c

; Direct response
103.8] ^ 0@ 1A #07 03020501#.0*0c

; Later unsolicited progress/completion updates MUST be in-session (`ﾎ.8]`) and the final one MUST end the session (`!ﾎ.8]`).
110.8] ^\ 0@ 50P #07 03020501#.0*1c
!120.8] ^\ 0@ 100P #07 03020501#.0*1c
```

### 9.7 Live feeds, buffered playback, and release (`f`, `>f`, `<f`)
```bcode
; Request transmission of any unreleased buffered data for this resource/dataset
; (device will emit unsolicited >f records in increasing `^` identifier order for this stream)
0@ 1R #07 03020501#.0f

; Direct response
^ 0@ #07 03020501#.0*0f

; Unsolicited buffered playback (>f), each with a `^` identifier used later for release
80^\ 0@ > 9A 3B #07 03020501#.0f
81^\ 0@ > 10A 3B #07 03020501#.0f

; Release buffered records up to identifier 81 (range release is an optimization; support is lookup-defined)
0@ < 81A #07 03020501#.0f

; Direct response
^ 0@ #07 03020501#.0*0f

; Enable live streaming for this resource/dataset (exact enable params are lookup.json-defined)
0@ 1A #07 03020501#.0f

; Direct response
^ 0@ #07 03020501#.0*0f

; Device begins unsolicited live updates (identifier in ^ field; data correlates to 'a')
100^\ 0@ 10A 3B #07 03020501#.0f
101^\ 0@ 11A #07 03020501#.0f

; If any device buffer is globally saturated, ALL unsolicited f and >f carry command-level '!'
120^\ 0@ 12A 4B !#07 03020501#.0f
121^\ 0@ > 11A 3B !#07 03020501#.0f

; If this specific resource suffered overflow discard, its unsolicited f and >f also carry command-level '?'
130^\ 0@ 13A ?#07 03020501#.0f
131^\ 0@ > 12A 4B ?#07 03020501#.0f

; If both apply, both qualifiers appear on the command field (recommended order '!?')
140^\ 0@ 14A !?#07 03020501#.0f

; The per-resource '?' loss latch is only cleared by an f command to this resource (e.g., a feed management request)
0@ 1A #07 03020501#.0f
^ 0@ #07 03020501#.0*0f

; Example: timestamp-less buffered logs using event-identifier mode (`^!`)
; Buffered record: event ID 1234, previous 1233
!1234,1233^\ 0@ > 9A 3B #07 03020501#.1f

; Release that specific event (happy path)
0@ < !1234,1233A #07 03020501#.1f
^ 0@ #07 03020501#.1*0f

; Example: limited-device boot-count+uptime timestamp model (no wall-clock)
; `K` is the pair (boot B, uptime U). Receiver correlates to its own time.
?<>7,1000^\ 0@ 10A #07 03020501#.2f
?<>7,1500^\ 0@ 11A #07 03020501#.2f
; After reboot: boot increments, uptime resets
?<>8,200^\ 0@ 12A #07 03020501#.2f
```

## 10. Instantiation and instance lifetime (`i`)

BCODe.rest uses the `@` parameter to select a specific **instance** of a resource.
For **instantiable** resource types, instances are created and destroyed via the reserved command letter `i`.

This section defines the on-wire semantics for `i` so that `@` addressing is implementable and grep-friendly.

### 10.1 Terminology
- **RID**: the 64-bit resource ID in the integer part of the command field (PEN<<32 | id32).
- **Instance selector**: the `@` parameter value (index 0 in the parameter array).
- **Instance key**: `(RID, @)`.

### 10.2 `i` verb selection via command-field qualifier
For the `i` operation category, the **command-field qualifier** selects the verb:

- `> ... i`  竍・**ALLOCATE** (instantiate / create)
- `< ... i`  竍・**DEALLOCATE** (destroy)
- no `<` or `>` qualifier 竍・**MANAGEMENT** (idempotent control-plane for allocation policy)

This is intentionally designed so that allocation and deallocation are easily discoverable by text search.

### 10.3 Allocation/deallocation variants via command sequence `N`
The command sequence selector `N` (fractional digits of the command field) is reserved for
**variant selection** within the allocate/deallocate category.

- For `>i` and `<i`, `N` MAY be used to select different argument sets or behaviors (constructor/destructor variants).
- Receivers MUST treat the fractional digits as an identifier, not float math.

**Reserved:**
- `N=0` is reserved for **allocation policy gating** (see ﾂｧ10.5). It MUST use unqualified `i` (MANAGEMENT).

### 10.4 `@` rules for instantiation

#### 10.4.1 Allocate (`>i`)
- If `@` is present with a numeric value: it is a **requested** instance selector.
- If `@` is absent: it is a request for a **responder-assigned** instance selector.
  The responder MAY reject if responder-assigned instance IDs are not supported for that RID.

#### 10.4.2 Deallocate (`<i`)
- `@` MUST be present with a numeric value selecting the instance to destroy.

#### 10.4.3 Type-scope selector (`@` = NULL)
Some `i` MANAGEMENT operations and `e` listings address the **resource type**, not a particular instance.
This is expressed by providing `@` with a NULL value-kind (as defined by BCODe interpretation; commonly written `<>?@`).

### 10.5 Allocation policy gating (MANAGEMENT, unqualified `i`, `N=0`)
Because allocation/deallocation have side-effects, implementations SHOULD support an explicit enable/disable gate.

A gate-control request is:
- command letter: `i` (unqualified; MANAGEMENT)
- command sequence: `N=0`
- `@`: SHOULD be NULL (type-scope) to avoid ambiguity

Parameters:
- `A` (boolean): enable allocation (`>i`)
- `B` (boolean): enable deallocation (`<i`)
- `C` (boolean): permanence/lock flag
  - If `C=1`, subsequent **wire** attempts to change gates MUST be rejected.
  - Implementations MAY allow an application-local mechanism to unlock gates.

Example: enable allocation, disable deallocation, lock policy:
```bcode
; Gate control: A=1, B=0, C=1
<>?@ 1A 0B 1C #07 03020501#.0i
```

### 10.6 Allocation timestamp tracking
Implementations SHOULD record an **allocation timestamp** for each successfully created instance key `(RID,@)`.
The representation is implementation-defined (wall-clock or monotonic), but MUST be stable for ordering.

This timestamp is used for:
- diagnostic listing (see ﾂｧ10.7), and
- global deallocation ordering (see ﾂｧ10.8).

### 10.7 Instance listing (idempotent) via `e` at type-scope
Instance enumeration is **idempotent**, so it is expressed as an `e` read, not as an `i` verb.

Request:
- command letter: `e`
- RID: the resource type
- `@`: NULL (type-scope)

Response:
- SHOULD be batched with `[` if multiple instances are returned.
- Each line SHOULD include:
  - the instance selector `@` (numeric), and
  - `T` parameter: allocation timestamp (see ﾂｧ10.6).

Example:
```bcode
; Request: list instances of RID
<>?@ #07 03020501#e

; Direct response: atomic batch listing 3 instances (T = allocation time)
^ 1.3[ 0@ 1000T #07 03020501#*0e
^ 2.3[ 2@ 1200T #07 03020501#*1e
^ 3.3[ 5@ 1300T #07 03020501#*2e
```

### 10.8 Global deallocate-all (optional)
Some systems require a 窶徼ear down all instances窶・mechanism.

A global deallocate-all request is:
- command letter: `i`
- verb: DEALLOCATE (`<` qualifier)
- `@`: NULL (type-scope)
- command field numeric: MAY be empty (no RID specified) to mean 窶彗ll RIDs窶・
Example:
```bcode
; Deallocate all instances of all instantiable resource types
<>?@ <i
```

Ordering rule:
- Instances MUST be deallocated in **reverse allocation timestamp order** (most recent first), across all RIDs.
- If timestamps are equal, implementations MAY break ties by `(RID,@)` ordering.

## 11. Error reporting (wire: value on `\`)

BCODe.rest defines a provisional error registry for the numeric value carried on the `\` response line.

To keep the main spec readable:
- human-friendly: keep full error tables in an appendix
- machine-friendly: publish a JSON and/or a C header (e.g., `bcode_rest_errors.h`)

### 11.0 Grouping rules

**Subcode digits are identifiers.** Treat the fractional digits as an identifier (subcode), not float math.

#### 11.0.1 Reserved groups

- **`-1`** is reserved for **BCODe.meta** errors (framing/meta commands).
- **`-95`** is reserved for **BCODe.rest** *generic* errors that are not scoped to a specific command letter.

Devices MUST NOT use `-1` or `-95` for command-scoped errors.

#### 11.0.2 Standard command-scoped groups

For errors scoped to a specific command letter, the group SHOULD be the negative decimal value of the command letter (ASCII):

- `a` 竍・**-97**
- `b` 竍・**-98**
- `c` 竍・**-99**
- `d` 竍・**-100**
- `e` 竍・**-101**
- `f` 竍・**-102**
- `i` 竍・**-105**

#### 11.0.3 Device-specific command-scoped groups (optional)

A device MAY publish device-specific command-scoped groups by subtracting **1000** from the standard command-scoped group.

Example:
- Standard `d` group is **-100**
- Device-specific `d` group is **-1100**

So a device-specific `d` subcode `.10` would be reported as **`-1100.10\`** instead of **`-100.10\`**.

If device-specific groups are used, they MUST be documented in the device窶冱 `lookup.json` (including subcode meanings).

---

### 11.1 Baseline request-level subcodes (recommended minimum)

The following subcodes are recommended minimums for all operation categories (both standard command-scoped groups and their
optional device-specific `-1000` offsets). Where applicable, the same subcodes MAY also be used under the generic `-95` group:

- `.1`  
  Malformed request (syntax/shape invalid for this `(RID,N)`).

- `.2`  
  Invalid/unknown `(RID,@)`.

- `.3`  
  Access denied.

- `.4`  
  Operation not supported for this target.

- `.5`  
  Temporarily unavailable / busy (retry may succeed).

---

### 11.2 `<b` UPDATE error subcodes (required minimum)

Because `<b` updates are atomic, failures MUST reject the request (no changes applied).

**Group:** standard **-98**; device-specific **-1098** (if declared in `lookup.json`).  
If using the device-specific group, substitute `-1098` for `-98` in the codes below.

- `-98.1`  
  Malformed update / illegal parameter set.

- `-98.10`  
  Missing required parameter.

- `-98.11`  
  Invalid required combination (discouraged coupled presence).

- `-98.12`  
  Value rejected (invalid / out-of-range / unparseable).

- `-98.20`  
  Update locked out (policy / interlock / safety gate).

- `-98.22`  
  Conflict / resource busy (atomic commit not possible now).

- `-98.23`  
  Commit failed (internal error; no changes applied).

---

### 11.3 `d` delta update error subcodes (required minimum)

Because `d` updates are atomic, failures MUST reject the request (no changes applied).

**Group:** standard **-100**; device-specific **-1100** (if declared in `lookup.json`).  
If using the device-specific group, substitute `-1100` for `-100` in the codes below.

- `-100.1`  
  Malformed delta request / illegal parameter set.

- `-100.10`  
  Parameter or variant does not support delta updates.

- `-100.11`  
  Change would exceed max/min.

- `-100.12`  
  Change would produce invalid value.

- `-100.20`  
  Delta updates locked out.

- `-100.22`  
  Conflict / resource busy.

- `-100.23`  
  Commit failed (internal; no changes applied).

---

### 11.4 `c` control error subcodes (required minimum)

**Group:** standard **-99**; device-specific **-1099** (if declared in `lookup.json`).  
If using the device-specific group, substitute `-1099` for `-99` in the codes below.

- `-99.1`  
  Malformed control request / illegal parameter set.

- `-99.20`  
  Control locked out (policy / interlock / safety state).

- `-99.21`  
  Illegal state transition / action not valid in current mode.

- `-99.22`  
  Conflict / action already in progress / resource busy.

- `-99.30`  
  Missing required control sequence counter `]`.

---

### 11.5 `f` feed/log error subcodes (recommended minimum)

`f`-group errors cover requester-issued `f` and `<f` requests.

**Group:** standard **-102**; device-specific **-1102** (if declared in `lookup.json`).  
If using the device-specific group, substitute `-1102` for `-102` in the codes below.

- `-102.1`  
  Malformed feed/log request / illegal parameter set.

- `-102.4`  
  Feed/log operation not supported for this `(RID,@,N)` (including 窶從o buffer exists窶・where required).

- `-102.5`  
  Temporarily unavailable / busy.

- `-102.10`  
  Invalid identifier range (min/max invalid or unsupported for the stream窶冱 `^` mode).

- `-102.11`  
  Release rejected (requested release would violate retention model or is otherwise invalid).

- `-102.12`  
  Playback request rejected (cannot transmit buffered data now).

- `-102.13`  
  Event not found / already released.  
  A single-event `<f` release referenced an event ID that is not present in the retained buffer for the targeted `(RID,@,N)` stream.

- `-102.14`  
  Release precondition failed (previous-ID mismatch).  
  The `<f` request provided an event identifier pair `(E,P)` (event-identifier mode), but the retained metadata for event `E` does not match the supplied `P`. No records were released.

- `-102.15`  
  Single-event release not supported.  
  Device supports buffered playback for this `(RID,@,N)` but does not support per-event release; only range release (or other lookup-defined release semantics) is supported.

- `-102.16`  
  Range release not supported.  
  Device supports single-event release for this `(RID,@,N)` but does not support bulk min/max release semantics.

- `-102.17`  
  Release target ambiguous / invalid selector.  
  The `<f` request does not uniquely identify a release target under the rules for this `(RID,@,N)` (e.g., missing required `A` selector, missing required `!` tag in event-identifier mode, malformed selector token, or conflicting selectors).

---

### 11.6 Errors for `i`

`i`-category errors MUST use error group **-105** (standard) or **-1105** (device-specific, if declared in `lookup.json`).
Subcodes are defined in `bcode_rest_errors.h` and are carried as fractional identifier digits on the numeric value of `\`.
