# BCODe for Telemetry: Design Rationale, Exceptions, and Scalable Complexity

**Status:** Informative guide (not normative)  
**Audience:** firmware/device implementers, telemetry pipeline/tool authors, protocol designers  
**Applies to:** BCODe syntax v10 + interpretation v10, and the conventions BCODe.meta (2026窶・2窶・2) and BCODe.rest v6.1.1 (2026窶・2窶・4)

---

## 0. What this document is

This guide explains *why* BCODe looks the way it does **in the context of telemetric data transmission and reception**, and how
its ecosystem is intentionally designed for **scalable complexity**:

- start with a **tiny ad窶蘇oc BCODe syntax protocol** to bring up hardware quickly
- then 窶忖pgrade in place窶・by adopting:
  - **BCODe interpretation** for quality/exception semantics
  - **BCODe.meta** for command/response + batching + sequencing + reset
  - **BCODe.rest** for resource-oriented semantics, discovery hooks, and deployment-grade interoperability

The important theme is: **you do not throw away your parser** as you scale. You add conventions.

---

## 1. Telemetry is not 窶徊ust numbers窶・
Real telemetry systems must communicate:

- **measurements** (scalars, counters, rates)
- **bounds** (窶彗t least this窶・ 窶從o more than that窶・
- **unknown / pending / not initialized**
- **invalid computational results** (NaN / signaling NaN)
- **freshness** (窶徼his value exists but is stale窶・
- **exceptions and diagnostics** (why something is missing/unusable)
- **attached context** (notes, binary frames, checksums, event records)

BCODe窶冱 split between *syntax* and *interpretation* is aimed at making these realities explicit without turning a stream protocol
into a heavyweight schema language.

## 2. Why the core syntax is telemetry-friendly

### 2.1 Streaming parsing and atomic latching

BCODe is parsed from an unbounded byte stream (serial, pipes, TCP, logs). A logical 窶徑ine窶・ends when a **command terminator**
(ASCII `0x60窶・x7F`) is seen **in normal mode**.

**Rationale:** in noisy or chunked transports, receivers must avoid applying partial updates. BCODe latches all parsed state
(fields + payloads) *atomically* only when a command character arrives. This is a natural resynchronization boundary and a safe
窶彡ommit point窶・

### 2.2 ASCII-column partitioning

BCODe assigns meaning by ASCII 窶彡olumn窶・(upper 3 bits):

- **Column 2 (`0x20窶・x3F`)**: digits, punctuation, qualifiers, payload/comment markers
- **Column 3 (`0x40窶・x5F`)**: **parameter terminators** (end a field, continue the line)
- **Column 4 (`0x60窶・x7F`)**: **command terminators** (end the final field and latch)

**Rationale:** receivers can classify bytes with cheap range checks / bitmasks, and terminators are structurally distinct from data.
This improves parser simplicity and robustness in embedded contexts.

### 2.3 Single-letter parameters and 窶從o bikeshedding窶・
**Premise:** single-letter parameter names avoid bikeshedding.

BCODe provides exactly **32 parameter identities** (low 5 bits of a terminator). This is deliberate:

- the mapping from 窶徘arameter index窶・to 窶徇eaning窶・is documented once (per resource/protocol)
- the wire format stays stable and compact
- software can naturally summarize presence/quality via `uint32_t` bitmasks

This is a pragmatic trade: you sacrifice self-describing verbosity on the wire to gain stability, bandwidth efficiency,
and fewer naming debates.

## 3. Numbers: locale tolerance, scientific notation, and safety constraints

### 3.1 Fixed-point pairs preserve intent

A numeric field can be:

- empty (no numeric content)
- single integer (`value1`)
- a **two-integer pair** (`value1` and `value2` with a recorded fractional width)

This supports deterministic parsing and preserves *how many digits were spelled* (leading zeros in the fractional part are meaningful).

### 3.2 Premise: 窶・窶・and 窶・窶・are used as decimal separators in the world

BCODe accepts both `.` and `,` as the **pair separator**.

- Many systems and humans use `.` as a decimal separator.
- Many locales use `,` as a decimal separator.
- BCODe窶冱 syntax accepts both to reduce friction.

**Important detail:** in syntax v10, `.` and `,` are *pair separators*, not locale-dependent decimal points, and the parser records
the sign of the second component based on the separator (`,` 竍・negative `value2`). The interpretation layer decides what that means
for a given accessor/application.

**Practical recommendation for interoperability:**
- standardize on `.` for ordinary fractional values unless you have a strong compatibility reason not to
- if you accept `,`-emitters, treat that as a **compatibility transform** in your receiver pipeline rather than assuming all senders
  intend the same semantics

### 3.3 Premise: scientific notation is needed

Telemetry often spans orders of magnitude. BCODe supports a compact exponent suffix:

- `*k` 竍・multiply mantissa by `10^k`
- `/k` 竍・multiply mantissa by `10^-k`

**Rationale:** this allows scientific-scale representation without colliding with command/parameter terminators (letters are reserved
for framing in BCODe).

### 3.4 Uppercase-only hex is a safety choice

Hex literals use `#...#` and hex payloads use `%...%`. Hex digits are **uppercase only**.

**Rationale:** lowercase `a窶吐` live in the command terminator column; forbidding lowercase reduces accidental collisions and helps
robust resync behavior.

## 4. Qualifiers: communicating exceptions and data quality on the wire

### 4.1 Premise: the need to communicate more than just the data

BCODe fields support qualifier characters:

- base qualifiers: `-`, `<`, `>`, `?`
- freshness modifier: `!` (stale)

### 4.2 Quality-first model (why this matters)

In telemetry, the first question is often:

1. 窶彿s the value usable?窶・2. 窶彿f not, why not?窶・3. 窶徙nly then, what is the number?窶・
BCODe窶冱 interpretation model makes this first-class. Instead of sentinel numbers, you can express:

- **bounds** (`<` / `>`)
- **unknown/pending** (`?`)
- **noise/unstable** (`-?`)
- **epsilon / infinity** (combinations with `?`)
- **null/no-data** (distinct from 窶彗bsent field窶・
- **NaN / signaling NaN** (reserved qualifier combinations)

### 4.3 Staleness as an orthogonal modifier

**Premise:** the role of qualifiers in communicating telemetric data exceptions.

`!` is orthogonal: a value can be 窶徭tale but finite窶・ 窶徭tale infinity窶・ 窶徭tale NaN窶・ etc.
This prevents 窶彷reshness窶・from being conflated with 窶忻alidity窶・

## 5. Multiple interpretations of the same field: a feature for telemetry pipelines

**Premise:** develop context and justification for the multiple interpretations of the same field.

Telemetry systems have multiple consumers:

- control loops want **strict hard numbers**
- UIs want **best-effort display** (including bounds, null, stale)
- logging wants **preservation** (raw + parsed + diagnostics)
- health monitoring wants **fast triage** (窶彗ny NaN/null/noise?窶・

BCODe supports this by separating:

- **raw parsed truth** (qualifiers, numeric shape, exponent metadata)
- **typed accessors** that apply local policy (strict vs permissive)
- optional **transforms** (normalization / compatibility)
- **reducers** that summarize per-field status into bitmasks (missing, empty, stale, diagnostic, hard-ok, etc.)

This is scalable: you keep one parser and add policy layers per consumer.

---

## 6. Payloads and comments: attaching context in telemetry streams

Telemetry sometimes needs to attach more than numeric fields:

- `$...` string payloads (opaque until LF/NUL)
- `%...%` hex-byte payloads (comment-friendly; whitespace and comments removed before decode)
- `&` raw binary payloads (length derived from `value1` only)

**Rationale:** you can attach:
- human-readable notes (firmware version, assertions)
- checksums
- compact binary frames
without changing the core field grammar.

Comments (`;...LF` and `( ... )`) are treated as whitespace: helpful for debugging and logs, but not semantic.

# 7. Scalable complexity: from bench hacks to deployment conventions

BCODe is intentionally layered. Complexity is optional and additive:

1. **BCODe syntax** 窶・a compact, streaming-safe grammar for fields/payloads.
2. **BCODe interpretation** 窶・standard meaning for qualifiers, quality-first accessors, reducers/transforms.
3. **BCODe.meta** 窶・a control-plane convention over streams (ACK/NAK, unsolicited, batching, sequencing, reset).
4. **BCODe.rest** 窶・an application-plane convention: resource IDs, operation categories, discovery hooks, diagnostics, feeds, etc.

The key property: **each layer composes over the same syntax**.

---

## 7.1 Stage 0: Ad-hoc syntax protocols (device bring-up)

For bench testing, you can define your own meaning for parameters and command letters:

- choose parameters: `A` temperature, `B` humidity
- choose command: `m` measurement snapshot

Example:

```bcode
25.4A 60B m
```

Benefits for bring-up:

- extremely low overhead to implement
- atomic latch on command terminator prevents partial updates
- log-friendly and grep-friendly

At this stage, you can ignore request/response, discovery, strict semantics, etc.

---

## 7.2 Stage 1: Add standard exception semantics (interpretation)

As soon as a system needs to communicate 窶從ot ready / invalid / bounded / stale窶・ ad-hoc sentinel values become a liability.
The interpretation layer gives standardized qualifier meanings and recommended accessor behavior.

Examples:

```bcode
25.4A ?B m          ; humidity unknown/pending
!25.4A 60B m        ; stale temperature but still a value
<100A m             ; upper bound
```

This stage is still lightweight: it mostly affects how receivers interpret fields, not the on-wire grammar.

---

## 7.3 Stage 2: Upgrade to BCODe.meta (deployment-grade reliability without redesign)

When you need real command/response behavior and robustness, adopt **BCODe.meta**.

BCODe.meta reserves:

- `^` affirmative response tag
- `\` negative response tag
- `^\` unsolicited statement tag
- `[` multiline packet/batch tag (atomic delivery)
- `]` sequence counter
- `` ` `` reset command

### 7.3.1 Command/response vs unsolicited

- Requests (窶彡ommands窶・ do **not** contain `^` or `\`.
- Direct responses are tagged: `^` (accept) or `\` (reject).
- Unsolicited statements must contain both: `^\`.

This cleanly separates:
- 窶廬 am replying to something窶・from
- 窶廬 am spontaneously reporting an event窶・

### 7.3.2 Multiline batching is for delivery, not semantics

`[` enables an atomic multi-line packet:

- receiver should buffer until packet completes
- then deliver the group as one unit

This is crucial for telemetry and control when you need multi-field updates without partial application.

### 7.3.3 Sequencing and reset for resynchronization

- `]` gives sequence counters so you can detect loss or resets
- `` ` `` provides a defined reset behavior: discard pending parse state, send no response, reset device-transmitted counters

## 7.4 Stage 3: Upgrade to BCODe.rest (resource semantics and interoperability)

BCODe.rest is a convention for forming telemetry statements and control operations over streams. It composes:
syntax + interpretation + meta.

BCODe.rest provides the missing 窶彭eployment plane窶・

- resource-oriented semantics and stable IDs
- standardized operation categories
- discovery hooks (`lookup.json`)
- unambiguous field presence rules (unsupported vs diagnostic)
- systematic diagnostics and error groups
- feed streaming and buffered log playback with explicit release

### 7.4.1 The ad-hoc-to-deployment bridge: PEN=0

BCODe.rest resource IDs are 64-bit; upper 32 bits are an IANA PEN namespace.

- **PEN=0** is explicitly reserved for **ad-hoc** resource IDs.
- Later, you can obtain a PEN and migrate to globally namespaced IDs.

This is the scalable complexity story in one feature: prototypes don窶冲 need a registry step, but deployed systems can.

### 7.4.2 Resources, indexing, and datasets

Key selectors:

- **RID**: the resource ID in the command field
- `@`: selects an instance of a resource (indexing)
- `N`: command sequence selector (fractional part of the command field); used as a stable dataset/variant selector

This makes it possible to evolve datasets without reassigning parameter meanings.

### 7.4.3 Standard operation categories (verbs)

BCODe.rest reserves command letters as operation categories, including:

- `a` dynamic read (idempotent; may be stale)
- `e` static read (idempotent; never stale)
- `b` stored update/readback (idempotent; PUT-ish)
- `d` delta update (non-idempotent; atomic; quantized; rejects out-of-range)
- `c` control actions (side effects)
- `f` feeds/logs (streaming + buffered playback + release)
- `i` allocate/deallocate (instantiation lifecycle)

You can implement only a subset at first and expand later.

### 7.4.4 Field presence rule: 窶徙mitted == unsupported窶・
For response datasets (reads and defined response payloads):

- **Unsupported field:** MUST NOT appear.
- **Supported field:** MUST appear either as a normal value or as a diagnostic value-kind (optionally with a diagnostic code).

This removes a major ambiguity from ad-hoc protocols.

### 7.4.5 Stale rules are tightened in rest

BCODe.rest constrains staleness:

- allowed on parameter fields for `a` (dynamic reads)
- forbidden for `e` (static reads)
- discouraged for stored-state operations unless explicitly defined

It also defines command-field qualifiers for feeds (`f` / `>f`) under buffer pressure and loss conditions.

### 7.4.6 Requests, responses, ordinals, and batching

BCODe.rest uses:

- `/R` on the command field for **request ordinals** within a `[` batched request packet
- `*R` on the command field for **response ordinals**
- `*0` is the required ordinal for the direct response

This provides a stable mechanism for multi-line requests/responses and later expansion of response datasets.

### 7.4.7 Controls are correlatable

For `c` operations:

- `<c` executes, `>c` is admission-check only (NOP)
- controls require a `]` request sequence identifier
- responses and unsolicited progress/completion updates must echo an identifier derived from the request

This makes async actions traceable.

### 7.4.8 Feeds and buffered logs (`f`, `>f`, `<f`)

BCODe.rest defines a unified model for:

- live feed updates (`f`, unsolicited)
- buffered playback (`>f`, unsolicited)
- explicit release (`<f`) so devices can safely discard delivered records

It also standardizes:

- required `^` field presence on unsolicited feed statements
- record identifiers (timestamp mode recommended; event-identifier mode with `^!` when no timestamps exist)
- command-field qualifiers:
  - `!` on unsolicited feed command field for global buffer saturation
  - `?` on unsolicited feed command field for per-resource overflow data loss

### 7.4.9 Instantiation (`i`)

For instantiable resources, `i` provides allocate/deallocate semantics (with `@` selecting instances) and supports allocation policy
gating. This is optional, but it enables large systems to manage dynamic resources in a uniform way.

# 8. Putting it together: recommended 窶徃rowth path窶・
## 8.1 A realistic evolution timeline

1. **Bench bring-up:** ad-hoc parameter mapping over syntax  
2. **First integration:** adopt qualifier semantics (interpretation) to stop using sentinel numbers  
3. **System hardening:** adopt meta (ACK/NAK, reset, sequencing, batching)  
4. **Deployment interoperability:** adopt rest (resource IDs, discovery hooks, standard operations, diagnostic rules, feeds)

## 8.2 Two common adoption strategies

### Strategy A 窶・窶徭tart ad-hoc, then adopt conventions窶・Fastest to type and debug; migration later.

### Strategy B 窶・窶忖se rest semantics early with PEN=0窶・Often smoother long-term:
- start with rest operation categories + resource model, but use PEN=0
- later move to a real PEN and publish `lookup.json`

# 9. Design 窶徃otchas窶・and best practices

- Avoid using meta-reserved tokens (`^`, `\`, `[`, `]`, `` ` ``) as application-defined parameters/commands if you plan to adopt meta/rest later.
- Prefer standardized qualifier semantics early; it keeps your data model stable.
- Treat receiver-side normalization (e.g., comma separator compatibility) as a transform step; don窶冲 bake assumptions into the base parser.
- For binary payloads:
  - `%...%` is great when you want comments and readability
  - `&` is great for throughput, but implement strict length caps and resync behavior
- Decide per consumer whether bounds are acceptable; don窶冲 silently coerce bounds into exact numbers in control loops.

# 10. Glossary

- **PARAM terminator:** ASCII `0x40窶・x5F`, ends a field and labels it.
- **CMD terminator:** ASCII `0x60窶・x7F`, ends the final field and latches the line.
- **Latch:** the moment a line becomes visible to the application (atomic commit point).
- **RID:** resource ID (BCODe.rest) in the integer portion of the command field.
- **PEN:** IANA Private Enterprise Number (namespace for RIDs).
- **Dataset selector `N`:** command sequence selector (fractional digits on command field) used as a stable dataset/variant selector.
- **Request ordinal `/R`:** ordinal used inside a batched request packet.
- **Response ordinal `*R`:** ordinal used for response datasets and follow-ons.

## 11.1 Define interoperability 窶徘rofiles窶・(capability levels)

BCODe scales because you can implement subsets. It helps readers if the guide defines a few common profiles that tooling
can advertise (or that you can put in device documentation):

- **Profile I (Interpretation-aware telemetry):** implement qualifier classification + typed accessors; reject non-hard values where needed.
- **Profile M (Meta control-plane):** implement `^`, `\`, `^\`, `[`, `]`, and reset `` ` ``.
- **Profile R (REST application-plane):** implement BCODe.rest resource ID parsing, operation categories, and the field presence rule.

## 11.2 Add a 窶徨eceiver hardening窶・checklist (limits, resync, and DoS resistance)

BCODe is stream-friendly, which also means it can be abused if you parse untrusted input. A short checklist helps implementers:

  - maximum `frac_width`

  - maximum payload length hints
  - maximum raw payload length for `&`
- **Treat overflow / excessive lengths as malformed** and resynchronize.
- **Budget memory**: for `$` and `%...%`, decide whether you buffer payloads, stream them, or hash/CRC them incrementally.
- **Validate length hints** (when present) and treat mismatches as parse errors.
- **Prefer 窶彭rop line + resync窶・* as your uniform recovery strategy for malformed constructs.

This turns 窶彿t works on clean data窶・into 窶彿t is robust on real links.窶・
## 11.3 Spell out a duplicate-parameter policy

BCODe syntax does not inherently forbid repeating a parameter within one line. The interpretation layer窶冱 typical adapter pattern
implicitly picks a policy (often 窶徑ast wins窶・. In real deployments, you should document one of:

- **First-wins** (more conservative for 窶忤rite once窶・semantics)
- **Reject duplicates** (strict; best when you want to detect malformed senders)

If your transport is a UART or a terminal session, add a small operational note:

## 11.6 Add an error model cheat sheet

BCODe.meta and BCODe.rest make negative acknowledgements (`\`) carry a numeric error/reason code. For real deployments, readers
benefit from a tiny summary:

The big win is that tooling can classify failures without per-device bespoke rules.

BCODe provides multiple ordering mechanisms:
