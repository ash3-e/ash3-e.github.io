# BCODe Best Practices & Conventions (Draft)

**Document date:** 2026-02-02  
**Audience:** protocol designers, firmware implementers, host/tool implementers  
**Applies to:** BCODe (lowercase *e*) streams over serial ports, TCP, WebSockets, pipes, and similar byte streams.

**Companion specs (syntax + standard interpretations):**  
- BCODe Syntax Specification (Draft, 2026-01-30) 訷filecite訷Ｕurn3file0訷・ 
- BCODe Value Interpretation (Draft, 2026-01-30) 訷filecite訷Ｕurn3file1訷・ 

---

## 1. Purpose

BCODe is a small, streaming, ASCII protocol designed to make **simple telemetry and control**:
- easy to generate (even with plain `printf`-style output),
- easy to transport over streams,
- easy to inspect, filter, and debug with commodity tooling (logs, `grep`, etc.),
- and easy to parse deterministically in constrained environments.

The tradeoff is intentional: BCODe is not a general-purpose document format. It is optimized for **flat, line-oriented statements** with a strict upper bound of **32 parameter identities**.

If you need nested objects, arbitrary key naming, schema evolution within the payload, or tree-shaped data models, BCODe expects you to justify that complexity and then choose a different representation.

---

## 2. The BCODe layering model

One of the most important design tenets is a clean separation:

1) **Syntax** 窶・what bytes mean structurally  
2) **Interpretation** 窶・how a parsed field becomes a numeric representation (integer, fixed-point pair, exponent) and how qualifiers map to value-classes  
3) **Semantics** 窶・what the numbers *mean* for a specific application or device domain  
4) **Conventions** 窶・standardized semantic profiles that encourage interoperability (e.g., `BCODe.meta`, `BCODe.rest`)

BCODe works best when you do **not** skip layers.

### 2.1 Syntax: a streaming, latch-on-command model

BCODe is parsed from an **unbounded byte stream**; there is no EOF concept. A 窶徑ine窶・is a logical unit that ends when a **command character** is read, at which point the entire line is **latched atomically**. 訷filecite訷Ｕurn3file8訷・
Fields are terminated by:
- **PARAM terminators** (ASCII `0x40窶・x5F`) for intermediate fields
- **CMD terminators** (ASCII `0x60窶・x7F`) for the final field, which also latches the line 訷filecite訷Ｕurn2file17訷・
### 2.2 Interpretation: quality-first telemetry and typed accessors

A parsed field has (at least) these properties: a base qualifier mask (`- < > ?`), an orthogonal stale flag (`!`), a numeric 窶徭hape窶・(empty/single/pair), and optional exponent metadata. 訷filecite訷Ｕurn2file2訷・
BCODe interpretation is explicitly **quality-first**: callers should be able to refuse a 窶徂ard numeric窶・result when the field is unknown, null, NaN, infinity, epsilon-only, etc. 訷filecite訷Ｕurn2file2訷・
### 2.3 Semantics: application-owned meaning

BCODe syntax and interpretation do **not** assign meaning to particular parameter letters or command letters. That mapping is owned by your application or by shared conventions. 訷filecite訷Ｕurn3file4訷・
### 2.4 Conventions: standard semantic profiles

In this document we treat 窶徭tandard semantics窶・as **conventions**:

- **BCODe.meta** 窶・command/response, unsolicited frames, multiline grouping, sequence counters  
- **BCODe.rest** 窶・resource-oriented process-control semantics built on BCODe streams (inspired by Representation State Transfer, not HTTP packets)

---

## 3. The 32-parameter reality (and why it窶冱 a feature)

BCODe has exactly **32 parameter identities** because parameter identity is defined by the low 5 bits of the terminator byte (`term & 0x1F`), producing indices `0..31`. 訷filecite訷Ｕurn2file15訷・
This constraint is a design choice:
- It bounds parser state.
- It forces semantic discipline.
- It encourages stable, conventional mappings.
- It makes bitmask operations natural and fast (selection, reduction, filtering). 訷filecite訷Ｕurn2file10訷・
### 3.1 Best practices under the 32-parameter limit

**Do:**
- Reserve a small set of parameters for cross-cutting conventions (e.g., meta, sequencing, routing).
- Treat `A窶纏` as your 窶彭omain payload窶・bucket unless a convention says otherwise.
- Create (and publish) a **parameter map table**: what each letter means in each command context.
- Keep each parameter **self-contained** (see 窶彿nterparameter dependency窶・below).

**Don窶冲:**
- Create a new parameter just to represent 窶忻alidity窶・ 窶徨eason窶・ 窶徇ode窶・ or 窶徭tatus窶・if it can be expressed by qualifiers or diagnostics.
- Create brittle schemas where field A is only valid if fields B and C are present.
- Attempt to encode nested structures by inventing ad-hoc 窶彙egin/end窶・markers inside parameters.

---

## 4. Make simple tasks simple (and keep them that way)

BCODe窶冱 窶徭uperpower窶・is that a BCODe line is:
- short,
- stable,
- grep-able,
- and can be generated with almost no tooling.

### 4.1 Generation should remain trivial

BCODe should be easy enough that a developer can emit valid output with:
- a few print statements, and
- a small amount of local formatting discipline.

If your application layer requires:
- multi-pass serialization,
- schema registries,
- complicated escaping rules,
- or mandatory binary-to-text encodings

窶ｦyou are eroding the core advantage of BCODe.

### 4.2 窶廨repability窶・as a design constraint

Prefer designs where:
- you can locate occurrences of a parameter with `grep 'A'`,
- you can locate a command class with `grep 'a$'` (or similar),
- you can eyeball bounds (`<` / `>`) and state (`?`, `!`) without decoding.

This pushes you toward:
- flat lines,
- minimal implicit coupling,
- and stable letter assignments.

---

## 5. Qualifiers: encode quality and intent *in the field itself*

BCODe provides a compact set of field qualifiers:
```bcode
-   <   >   ?   !
```
The syntax spec defines their syntactic role, and the companion interpretation spec defines standard meanings. 訷filecite訷Ｕurn2file14訷・
### 5.1 Staleness is `!` (orthogonal)

The `!` qualifier is an **orthogonal freshness modifier** that may be combined with any base value class, including infinity and NaN. It does not change the base class. 訷filecite訷Ｕurn2file3訷・
Examples:
- `!12.3A` 窶・stale but still a hard numeric value
- `!>?A` 窶・stale positive infinity
- `!-<>?A` 窶・stale NaN

### 5.2 Base value-class truth table (`- < > ?`)

The four base qualifiers define the **base value class**, independent of staleness. The interpretation spec reserves and standardizes combinations including epsilon, infinity, null, NaN, and signaling NaN. 訷filecite訷Ｕurn2file4訷・
Key combinations (summary):

- **Exact (hard numeric):** no `<` or `>` or `?` (optionally `-` for sign)
- **Bounds:**  
  - `<` means 窶忻alue is less than stated窶・(upper bound)  
  - `>` means 窶忻alue is greater than stated窶・(lower bound) 訷filecite訷Ｕurn2file4訷・- **Unknown/pending:** `?`
- **Noise/unstable:** `-?`
- **Epsilon (smallest device step):** `<?` (positive) and `-<?` (negative) 訷filecite訷Ｕurn2file0訷・- **Infinity:** `>?` (positive) and `->?` (negative) 訷filecite訷Ｕurn2file0訷・- **sNaN (signaling NaN):** `<>` and `-<>` (reserved; C1 only; `value1` carries a payload/code) 訷filecite訷Ｕurn2file3訷・- **Null (no data):** `<>?`
- **NaN (invalid computational result):** `-<>?` (quiet/invalid; not a hard value) 訷filecite訷Ｕurn2file0訷・
> **Important:** 窶廝ounds窶・are not hard values. Accessors that return hard numerics should reject `<`/`>` unless an explicit bound/interval type is requested. 訷filecite訷Ｕurn2file6訷・
### 5.3 Diagnostics without extra parameters

Qualifiers let a single parameter express 窶徼his isn窶冲 a usable measurement,窶・while still carrying **a numeric code** that describes *why*.

This is a core design strategy:
- avoid adding a separate `X_status` parameter,
- avoid inventing a 窶徨eason窶・parameter,
- and avoid interparameter dependency.

Two common patterns:

1) **Signaling NaN with a diagnostic code** (reserved by the interpretation spec):
```bcode
17<>A      ; sNaN payload/code 17
-5<>B      ; signed sNaN payload/code -5 (if your domain wants signed codes)
```
(Use single-number shape C1 for sNaN.) 訷filecite訷Ｕurn2file3訷・
2) **Unknown/Noise with a diagnostic code** (application-defined):
```bcode
?12A       ; unknown/pending with code 12
-?3B       ; noisy/unstable with code 3
```
(Interpretation policy: numeric digits 窶徇ay be present but should not be treated as hard窶・for certain value classes.) 訷filecite訷Ｕurn2file4訷・

## 6. Use qualifiers for control intent (not just telemetry)

Qualifiers are also useful when sending *commands*.

Instead of forcing the host to compute an exact target that the device may not be able to hit cleanly, the host can send intent:

### 6.1 Bounds delegate resolution to the device

Example: 窶彜et temperature to at least 100ﾂｰC窶・
```bcode
>100C
```
The device is responsible for:
- choosing the nearest representable setpoint 竕･ 100,
- handling overshoot policy,
- and acknowledging what it actually applied (if desired).

### 6.2 Epsilon steps avoid 窶徂ost knows device resolution窶・
For 窶彿ncrease by the smallest representable increment窶・
```bcode
<?C
```
This delegates the increment size to the device, avoiding a host-side dependency on device quantization.

---

## 7. Avoid interparameter dependency

One of the strongest BCODe line-design principles is:

> A parameter should 窶徭tand alone窶・as much as possible.

Interparameter dependency is where protocols go to die: it creates hidden rules, brittle parsing, and complicated failure modes.

### 7.1 Practical rules

- If a value can be 窶彿nvalid窶・ encode invalidity in the field itself (qualifiers), not in a separate field.
- If a value needs a reason code, encode it in the same field as a diagnostic number.
- If a value is stale, mark it stale with `!`, rather than introducing `A_age_ms`.
- If a value is bounded, encode bounds with `<`/`>`, rather than `A_low` / `A_high` pairs unless you truly need intervals.

### 7.2 Use reducers and masks for policy, not schema coupling

The interpretation spec describes a 窶徨educer窶・that summarizes per-field status into bitmasks (missing/empty/stale/exact/bound/diagnostic) so software layers can apply policy without baking in semantics. 訷filecite訷Ｕurn2file11訷・
Transforms and reducers naturally use 32-bit masks keyed by the 32 parameter identities. 訷filecite訷Ｕurn2file10訷・
Recommended pipeline:
```text
stream bytes
  -> parse (syntax; latch on CMD)
  -> optional transforms
  -> reduce line (bitmask summary)
  -> typed accessors / policy logic
```

## 8. Convention: BCODe.meta (Command窶迭esponse)

**BCODe.meta** is a convention for request/response framing, unsolicited statements, multiline grouping, and sequence counters. It reserves a small set of parameters for 窶徘rotocol plumbing窶・rather than application data.

### 8.1 Response tagging

- `^` 窶・affirmative response (optional integer value may be a timestamp)
- `\` 窶・negative response (optional numeric may be a reason code; may be negative)
- `^\` 窶・unsolicited statement (sent without a request; `^` may carry a timestamp)

Commands themselves do not carry `^` or `\`.

**Affirmative response, no timestamp**
```bcode
10A 0.0c
^ 0.0c
```

**Affirmative response with timestamp**
```bcode
11B 2.0c
192873121^ 2.0c
```

**Negative response, no reason**
```bcode
10A 0.0c
\ 0.0c
```

**Negative response with reason**
```bcode
11B 2.0c
-1.13\ 2.0c
```

**Unsolicited statement**
```bcode
^\ 10A 0.0f
19283123123^\ 11B 2.0f
```



### 8.1.1 Error reporting in the `\` field (provisional)

The `\` parameter MAY carry a numeric value to explain why a request was denied, rejected, or could not be processed.
This section defines a **provisional** BCODe.rest error-code registry for that numeric value.

This convention applies to:

- **Negative responses** (lines tagged with `\`)
- **Unsolicited follow-ons** (lines tagged with `^\`) where the `\` field carries a failure/status code

If the `\` field is empty, the error/status is unspecified.

#### 8.1.1.1 On-the-wire encoding

BCODe.rest encodes an error as a **(group, subcode)** pair inside the `\` field.

- The **group** is a negative integer (e.g., `-1`, `-2`, `-97`).
- The **subcode** is a nonnegative integer written after the decimal point (e.g., `.0`, `.1`, `.12`).

**Decoder requirement (normative):**  
Decoders MUST NOT treat the error value as a floating-point quantity. They MUST decode it using the raw parsed integer pair:

- `group` = signed integer from the integer part  
- `subcode` = base-10 integer from the fractional digits (`value2`, using `frac_width`)

This preserves the distinction between `-1.1` (subcode 1) and `-1.10` (subcode 10).

**Encoding guidance (recommended):**
- Always include a decimal point and at least one digit (i.e., prefer `-1.0\` over `-1\`).
- For subcodes 竕･ 10, include all digits (e.g., `-1.10\`).
- Avoid leading zeros in the subcode (e.g., prefer `-1.2\` over `-1.02\`) unless you intentionally use fixed-width formatting.

#### 8.1.1.6 Device-specific errors (group = `-1000 - ASCII(command)`)

BCODe.rest reserves a device-specific error space per command:

> **Device-specific group = BCODEREST_ERRDEV + (-(ASCII(command)))**

Equivalently:

> **Device-specific group = -(1000 + ASCII(command))**

Examples:

| Group  | Command | Meaning |
|-------:|:------:|---------|
| -1097 | `a` | Device errors |
| -1098 | `b` | Device errors |
| -1099 | `c` | Device errors |
| -1100 | `d` | Device errors |
| -1101 | `e` | Device errors |
| -1102 | `f` | Device errors |
| -1105 | `i` | Device errors |

Device-specific subcodes (fractional digits) are vendor-defined. Vendors SHOULD document these codes in their `BCODe.rest` lookup mechanism (see ﾂｧ9.2.1) so third parties can decode failures without out-of-band knowledge.

### 8.2 Multiline grouping: `[` (packet) and `]` (sequence)

#### `[` 窶・multiline packet tag

The `[` parameter marks a set of lines as a **packet** that must be evaluated as a group.

- The purpose of `[` is **atomic batching**: receivers SHOULD buffer packet lines and deliver them to the application **as a single grouped statement**, rather than exposing each line as an independent statement.
- The `[` field on each line uses the form `i.t[`:
  - integer part `i` identifies the **1-based line index** within the packet
  - fractional part `t` identifies the **total number of lines** in the packet
- Packet lines SHOULD be contiguous and in order (`1..t`). Interleaving lines from different packets is discouraged and may be treated as an error.
- If a packet is incomplete or inconsistent (missing indices, mismatched totals, etc.), receivers SHOULD discard the packet (or surface an explicit packet error), rather than delivering partial application data.


##### Open-ended packets (unknown length)

Some **multiline responses** (direct responses or unsolicited follow-ons) cannot know their final line count when the first line is transmitted. In this case, a packet MAY be sent **without an upfront end bound** by qualifying the `[` parameter with the `>` qualifier.

- Each **non-final** line MUST include a `[` field of the form `>n[` (single-integer), where `n` is the **1-based line index** within the packet.
- The numeric `n` value MUST **monotonically increase** for each subsequent line (canonical form increments by `+1`).
- The packet MUST be terminated by a **final** line whose `[` field is encoded in the fixed-bound form `n.t[` **without** the `>` qualifier, where `t` is the final total number of lines in the packet and `n == t`.
  - This closing line MUST be syntactically indistinguishable from the last line of a packet that had fixed bounds from the start.
- Receivers MUST NOT deliver any packet lines to the application until the terminating fixed-bound line is received (atomic batching).

Example: open-ended packet closed at 3 lines
```bcode
>1[ 10A 1B 0.0a
>2[ 11A 2B 3C 0.0a
3.3[ 1A 2B 3C 0.0a
```


Example: three-line packet
```bcode
1.3[ 10A 1B 0.0a
2.3[ 11A 2B 3C 0.0a
3.3[ 1A 2B 3C 0.0a
```

Example: two-line unsolicited packet
```bcode
^\ 1.2[ 10A 3B 4C 0.0f
^\ 2.2[ 78A 4B 0.0f
```

A response to a multiline command does not need to match the number of lines in the initial command.

#### `]` 窶・sequence number

Use `]` as a sequence counter to help:
- debug ordering,
- detect missing statements,
- detect remote resets (sequence discontinuity),
- correlate multi-line packets.

Example: three-line sequence
```bcode
100] 10A 1B 0.0a
101] 11A 2B 3C 0.0a
102] 1A 2B 3C 0.0a
```

Example: discontinuity (detect reset)
```bcode
1000] 10A 3B 0.0c
0] 100A 1B 0.0c
```

**Design note:** choose a rollover strategy that makes rollover either known or extremely improbable (e.g., 64-bit).  


### 8.3 RESET command (`` ` ``)

The backtick command (`` ` ``) is reserved as a **RESET** command.

**Semantics (normative):**
- Upon receiving the RESET command, a device **MUST** silently discard any currently parsed parameters and any in-progress payload reception.
- The device **MUST NOT** send any response (no `^` / `\` / `^\` tagging). RESET is intentionally silent.
- After RESET, all `]` sequence counters transmitted from the device **MUST** restart from `0`.

**Usage (informative):**
- RESET is intended for session start or resynchronization on stream transports (serial consoles, terminal sessions, etc.) to ensure no lingering partial commands are in effect.
- Because `$` string payloads terminate on a newline, RESET **SHOULD** be sent after one or more `\n` bytes to terminate any partially received string payload.
- For extra insurance when attaching mid-stream, multiple `\n` bytes MAY be sent first to 窶徘ad窶・through any short binary payload reception on the receiver before issuing RESET.

Example session-start resync sequence (bytes sent by host):
```bcode
\n\n\n`
```

## 9. Convention: BCODe.rest (Process control over BCODe streams)

**BCODe.rest** (renamed from 窶弃COB窶・ is a convention for simple control and telemetry over BCODe. It encodes the idea of **resources**, **indexes**, **commands**, and **command sequences**.

This convention is 窶彝EST-inspired窶・in the **Representation State Transfer** sense, not 窶廩TTP REST窶・

### 9.1 窶彝EST窶・here is not HTTP

HTTP REST is optimized for discrete, intermittent packet exchange.  
BCODe.rest is optimized for **continuous streams** (serial ports, TCP streams, WebSockets) where ordering and incremental delivery are first-class.

Not everything in BCODe.rest will map cleanly to HTTP verbs, and that is expected.

### 9.2 Resource identifier (64-bit)

A **resource** is identified by a unique 64-bit number, carried as the integer part of the BCODe command.

Split:
- Upper 32 bits: IANA PEN (namespacing by organization)
- Lower 32 bits: resource identifier within that PEN窶冱 namespace

Resources typically model a record with multiple fields (e.g., thermostat: temperature, thresholds, state bits).

### 9.2.1 Resource ID ownership and PEN-based lookup

BCODe.rest treats the 64-bit **resource ID** as the primary key for decoding the meaning of a statement. If you do not know what a resource ID means, you cannot reliably interpret the line窶冱 parameters.

**Publishing rule (normative):**
- Any party that publishes a BCODe.rest specification intended for interoperable third-party decoding **MUST** obtain an **IANA Private Enterprise Number (PEN)** and place it in the **upper 32 bits** of every resource ID it defines.
- The PEN acts as a global namespace boundary. The lower 32 bits are then free for that PEN-holder to partition as needed.

**Ad-hoc namespace (PEN = 0) (convention):**
- A PEN value of `0` in the upper 32 bits designates a resource ID as **ad-hoc**: its meaning is not discoverable via the PEN lookup mechanism and requires full contextual information (out-of-band documentation, local agreements, or direct source access).
- This is intended to streamline tinkering, prototypes, and initial development.
- Any party publishing a specification intended for third-party decoding **MUST NOT** use PEN `0`; obtain an IANA PEN and use it instead.

**Standard-definition namespace (PENs 5窶・) (convention, TBD):**
- IANA PEN values `5`, `6`, `7`, and `8` are early registry assignments (currently listed as ACC, TWG, CAYMAN, and PSI) and are treated by BCODe.rest as **defunct/appropriable** for standard resource definitions.
- BCODe.rest reserves these PEN values for future **standard resource definitions** (governance and format TBD).
- Until those standard definitions are published, implementations SHOULD treat these PENs as reserved and SHOULD NOT use them for vendor-specific namespaces.

**Discovery rule (normative, convention):**
- When a decoder encounters an unknown resource ID, it SHOULD:
  1) Extract the upper 32-bit PEN.
  2) If the PEN is `0`, treat the line as **ad-hoc** (no lookup is possible) and rely on full contextual information.
  3) Otherwise, look up that PEN in the IANA PEN registry.
  4) Extract a domain name from the registry窶冱 contact email (typically the substring after `@`).
  5) Retrieve the vendor窶冱 BCODe.rest lookup document via HTTP at:

     - `https://<domain>/BCODe.rest/lookup.json` (recommended)
     - `http://<domain>/BCODe.rest/lookup.json` (optional fallback)

The lookup document provides the mappings needed to interpret the resource and its parameter semantics (format TBD).

**Implementation notes (informative):**
- PEN holders SHOULD ensure their PEN registry contact email uses a stable organizational domain suitable for discovery (avoid throwaway email domains).
- Consumers SHOULD cache lookup results (including negative results) and treat the lookup as advisory: lack of a lookup document must not break parsing of the underlying BCODe stream.


### 9.3 Index (`@`)

The parameter `@` identifies an instance of the resource (e.g., thermostat 0, 1, 2).  
The index may include a fractional value to add another hierarchy layer.

### 9.4 Command, command sequence, and response ordinal

- The command is the **lowercase letter** at the end of the line.
- The command sequence is the **fractional portion** of the command窶冱 resource number (the `.N` part).
- Statements associated with that request are numbered with a **response ordinal** encoded as a `*R` suffix on the command number.

  - Syntactically, this reuses BCODe窶冱 scientific exponent suffix (`*`), which is already parsed into `(exp_present, exp10)`.
  - In **BCODe.rest**, interpret `exp10` as a **response ordinal**, not as numeric scaling (for the command field only).

Rules:

- A request command sequence `N` MUST be a nonnegative integer (application-defined).
- Any statement that refers to that request MUST reuse the exact same sequence `N`.
- Any such statement MUST include an explicit ordinal `*R` where `R` is a nonnegative integer (digits required; do not rely on the implicit default exponent).
- For a given request, response ordinals SHOULD be **allocated monotonically** starting at `R = 0` and increasing when a *new kind* of statement is introduced.
- A given ordinal `R` MAY be **repeated** to publish incremental updates for the same statement kind (for example, progress reporting).
  - In that case, multiple lines with the same `*R` are an **update stream**; ordering should be determined by timestamps (on `^`) and/or a `]` sequence counter if present.

This scheme allows a command that originally had a single response to evolve into 窶徇ultiple responses窶・**without renumbering** the command sequence `N` (so you don窶冲 shift dataset IDs embedded in that fractional portion).

#### 9.4.1 Direct response vs delayed results (BCODe.meta interaction)

BCODe.rest relies on `BCODe.meta` for command/response framing:

**Direct response (immediate acknowledgement)**

- The direct response to a command MUST be an **affirmative acknowledgement** tagged with `^`.
- The direct response MUST begin with ordinal `*0`.
- If the direct response requires more than one line, those lines MUST be grouped as a **multiline packet** using the `[` parameter (each line contains `[`).
- Packet enumeration MAY be fixed-bound (`i.t[`) or open-ended (`>n[` ... terminating with `n.t[`), as defined in ﾂｧ8.2.
- In a multiline direct response packet, ordinals MUST start at `*0` but MAY use `*1`, `*2`, 窶ｦ on subsequent lines. This ensures the interpretation of each line does **not** depend on the presence of `[`; `[` only controls **atomic batching**.

**Delayed results (follow-on statements)**

Delayed results are considered **unsolicited statements** and therefore:

- MUST include both `^` and `\` tags (i.e. `^\` is present on each line).
- MUST use ordinals that are either:
  - **new ordinals** that continue after the direct response (e.g., if the direct response used `*0` only, the first new delayed statement uses `*1`; if the direct response used `*0..*2`, the first new delayed statement uses `*3`), or
  - **repeats of an existing ordinal `R > 0`** to publish incremental updates (progress/status) for that stage.
  - `*0` is reserved for the direct acknowledgement packet and MUST NOT be used for delayed follow-ons.
- If a delayed result spans multiple lines, it MUST be grouped as a packet using `[` and SHOULD use consecutive ordinals within that packet.
  - Open-ended packet enumeration (using `>` on `[`) is permitted when the final line count is not known up front; see ﾂｧ8.2.

In unsolicited follow-ons, the `\` field MAY carry a numeric failure/status code (including negatives). If no failure/status code is needed, it may be empty; the presence of `\` still serves as part of the unsolicited marker in `^\`.



#### 9.4.2 Ordinal reuse for progress / intermediate updates

Sometimes a device needs to publish *incremental updates* for the same stage (for example, percent completion while an operation is running) without allocating a brand-new ordinal for every update.

In that case, the device MAY **repeat** the same `*R` on multiple statements for the same command sequence `N`. Receivers should treat multiple statements with the same `(N, R)` as an update stream (for many applications, 窶徑atest wins窶・ for logs, keep all).

Example (percent completion updates using repeated `*2`):

```bcode
^\ 30A 0.1*2a ; 30 percent complete
^\ 35A 0.1*2a ; 35 percent complete
```

Example (direct acknowledgement only; delayed single-line result later):

```bcode
; Request
0@ #07 03 02 05 01#.0a

; Direct response: positive acknowledgement (no data)
^ 0@ #07 03020501#.0*0a

; Later: unsolicited result (success) tagged with ^\
1231211231^\ 0@ 10A 3B #07 03020501#.0*1a
```

Example (multiline direct response: must use `[`; ordinals begin at *0 and continue):

```bcode
; Request
0@ #07 03 02 05 01#.0a

; Direct response: 2-line packet (grouped with [)
1231211231^ 1.2[ 0@ 10A 3B #07 03020501#.0*0a
1231211231^ 2.2[ 0@ 11A 4B #07 03020501#.0*1a
```

Example (direct acknowledgement only; delayed multi-line result later):

```bcode
; Request
0@ #07 03 02 05 01#.0a

; Direct response: positive acknowledgement (no data)
^ 0@ #07 03020501#.0*0a

; Later: unsolicited 2-line packet (grouped with [)
1231211231^\ 1.2[ 0@ 10A 3B #07 03020501#.0*1a
1231211231^\ 2.2[ 0@ 11A 4B #07 03020501#.0*2a
```

Example (direct acknowledgement; later unsolicited failure code on `\`):

```bcode
; Request
0@ #07 03 02 05 01#.0a

; Direct response: positive acknowledgement (no data)
^ 0@ #07 03020501#.0*0a

; Later: unsolicited completion with failure code (-1.3) on the \ field
1231211231^-1.3\ 0@ #07 03020501#.0*1a
```

### 9.5 Read commands

Two read classes:

#### `a` 窶・read dynamic dataset (timestamp recommended)

**Synchronous data (returned in the direct response):**
```bcode
0@ #07 03 02 05 01#.0a
1231211231^ 0@ 10A 3B #07 03020501#.0*0a
```

**Synchronous data across multiple lines (must be grouped with `[`):**
```bcode
0@ #07 03 02 05 01#.0a
1231211231^ 1.2[ 0@ 10A 3B #07 03020501#.0*0a
1231211231^ 2.2[ 0@ 11A 4B #07 03020501#.0*1a
```

**Delayed data (direct response is ack; data arrives later as unsolicited `^\`):**
```bcode
0@ #07 03 02 05 01#.0a
^ 0@ #07 03020501#.0*0a
1231211231^\ 0@ 10A 3B #07 03020501#.0*1a
```

**Delayed data across multiple lines (unsolicited result must still be grouped with `[`):**
```bcode
0@ #07 03 02 05 01#.0a
^ 0@ #07 03020501#.0*0a
1231211231^\ 1.2[ 0@ 10A 3B #07 03020501#.0*1a
1231211231^\ 2.2[ 0@ 11A 4B #07 03020501#.0*2a
```

**Delayed failure (direct ack; later unsolicited completion carries a failure code on `\`):**
```bcode
0@ #07 03 02 05 01#.0a
^ 0@ #07 03020501#.0*0a
1231211231^-1.3\ 0@ #07 03020501#.0*1a
```

#### `e` 窶・read static dataset (timestamp optional)

**Synchronous data (returned in the direct response):**
```bcode
0@ #07 03 02 05 01#.0e
^ 0@ 10A 3B #07 03020501#.0*0e
```

**Delayed data (direct ack; data arrives later as unsolicited `^\`):**
```bcode
0@ #07 03 02 05 01#.0e
^ 0@ #07 03020501#.0*0e
^\ 0@ 10A 3B #07 03020501#.0*1e
```

Other command letters (brief):


- `c` 窶・initiate resource control (req/resp)
- `f` 窶・data feed (unsolicited)
- `i` 窶・(de)allocate (req/multi-resp)

## 10. Streaming-first transport design

BCODe assumes a stream:
- no EOF requirement,
- robust resynchronization after errors,
- and deterministic parsing even with interleaving comments/payloads between tokens. 訷filecite訷Ｕurn3file11訷・
This makes BCODe a natural fit for:
- serial ports
- WebSockets
- TCP streams
- embedded debugging consoles

### 10.1 Payloads: carry strings and binary without 窶廱SON gymnastics窶・
BCODe supports payloads as first-class syntax:
- `$...` string payload (ends at LF or NUL; body is opaque)
- `%...%` hex-byte payload (whitespace allowed; comments allowed inside)
- `&` raw-binary payload (length derived from the numeric accumulator/value1; body is opaque) 訷filecite訷Ｕurn3file12訷・
Qualifiers apply **only to fields**, not to payloads. 訷filecite訷Ｕurn2file13訷・

## 11. JSON vs BCODe (comparison boxes)

### 11.1 Names, translation, and arbitration

| Topic | JSON | BCODe |
|---|---|---|
| Field identification | String keys (names) | Letter parameters (codes) |
| Cross-language friction | Keys often reflect one language窶冱 vocabulary and abbreviations | Language-neutral wire identifiers |
| Arbitration | Naming debates are common (窶徼empC窶・vs 窶徼emperature_celsius窶・ | No naming arbitration on the wire |
| Schema churn | Renames and aliases become long-term baggage | Semantics evolve in docs/profiles while letters remain stable |
| Tooling | Requires JSON tooling; grep is noisier | Grep-friendly by design |

**Principle:** human language belongs in documentation and UI, not in the wire format.

### 11.2 Strings, binary, and payload realism

| Topic | JSON | BCODe |
|---|---|---|
| Strings | Native | Native (payloads) |
| Binary | Not native; must be encoded (e.g., Base64) | Native (`&` raw-binary) |
| Streaming fit | Encoded blobs and framing complicate streams | Payload bodies are designed for streams 訷filecite訷Ｕurn3file12訷・|

### 11.3 IEEE-754 telemetry fidelity

BCODe窶冱 qualifier classes explicitly represent exceptional numeric states such as infinity, NaN, null/no-data, epsilon, and signaling NaN. 訷filecite訷Ｕurn2file0訷・
A particularly important capability is signaling NaN:
- `<>` and `-<>` are reserved for sNaN and carry a payload/code in `value1` (C1 only). 訷filecite訷Ｕurn2file3訷・

## 12. When to choose something else

Choose a different representation when you truly need:
- nested trees / arbitrary depth objects,
- large evolving schemas with self-describing names,
- ad-hoc arrays of heterogeneous objects,
- or interoperability primarily driven by 窶忤eb document窶・tooling.

BCODe is intentionally not trying to be everything.
