  {id:18,name:"5721 Northumberland St",address:"5721 Northumberland St, Pittsburgh, PA 15217",rent:[1200,1200],sqft:750,beds:2,baths:1,available:"Now",as:0,pets:false,am:["Furnished","Smoke Free"],phone:"Contact Property",url:"https://www.apartmenthomeliving.com/pittsburgh-pa/squirrel-hill-south",tag:"Furnished",note:"Furnished unit \u2014 contact for details"},
  {id:19,name:"Squirrel Hill Flats \u2014 Darlington",address:"5700-5706 Darlington Rd, Pittsburgh, PA 15217",rent:[1300,1600],sqft:850,beds:2,baths:1,available:"Contact",as:3,pets:false,am:["Near Murray Ave","Quiet Street","Renovated"],phone:"aaron@squirrelhillflats.com",url:"https://www.flatquest.com/apartments/",tag:null,note:"Multiple 2BR units at 5700 & 5706 Darlington \u2014 email for pricing & availability"},
  {id:20,name:"6350 Forward Ave",address:"6350 Forward Ave, Pittsburgh, PA 15217",rent:[1200,1500],sqft:900,beds:2,baths:1,available:"Contact",as:3,pets:false,am:["Off-Street Parking","Dishwasher","Hardwood Floors","A/C"],phone:"aaron@squirrelhillflats.com",url:"https://www.flatquest.com/6350-forward-avenue/",tag:null,note:"Squirrel Hill Flats \u2014 email for current 2BR availability"},
  {id:21,name:"5660 Forward Ave",address:"5660 Forward Ave, Pittsburgh, PA 15217",rent:[1145,1265],sqft:750,beds:2,baths:1,available:"Contact",as:3,pets:false,am:["Utilities Included","Verified"],phone:"Contact Property",url:"https://www.apartmenthomeliving.com/pittsburgh-pa/squirrel-hill-south",tag:"Utils Incl",note:"Utilities included in rent \u2014 contact for current availability"}
];
const tagStyles={"Move-In Special":{b:"rgba(214,188,141,0.16)",t:"#f4deb4",br:"rgba(214,188,141,0.3)"},"Popular":{b:"rgba(95,212,196,0.14)",t:"#c8fff8",br:"rgba(95,212,196,0.3)"},"Luxury":{b:"rgba(246,215,170,0.12)",t:"#fff0d4",br:"rgba(246,215,170,0.3)"},"Frick Park":{b:"rgba(103,193,255,0.12)",t:"#d7efff",br:"rgba(103,193,255,0.26)"},"2 Bath":{b:"rgba(120,164,255,0.12)",t:"#e4edff",br:"rgba(120,164,255,0.28)"},"Largest Wendover":{b:"rgba(122,224,176,0.12)",t:"#d7f9e7",br:"rgba(122,224,176,0.28)"},"Great Price":{b:"rgba(111,232,184,0.12)",t:"#d8feec",br:"rgba(111,232,184,0.28)"},"Renovated":{b:"rgba(214,188,141,0.16)",t:"#ffe7bd",br:"rgba(214,188,141,0.28)"},"Furnished":{b:"rgba(235,187,255,0.13)",t:"#fae0ff",br:"rgba(235,187,255,0.26)"},"Utils Incl":{b:"rgba(127,214,255,0.12)",t:"#dff5ff",br:"rgba(127,214,255,0.24)"}};
const rentOptions=[[1400,"$1,400"],[1600,"$1,600"],[1800,"$1,800"],[2000,"$2,000"],[2400,"$2,400"],[3200,"No max"]];
const availabilityOptions=[["all","All timing"],["now","Available now"],["spring","By May 2026"],["summer","Summer 2026"],["contact","Contact listings"]];
const sortOptions=[["availability","Soonest move-in"],["rent","Lowest rent"],["value","Best value / sq ft"],["largest","Largest floor plan"]];
const fmt=(n)=>"$"+n.toLocaleString();
const rentText=(apt)=>apt.rent[0]===apt.rent[1]?fmt(apt.rent[0]):fmt(apt.rent[0])+" - "+fmt(apt.rent[1]);
const whenText=(apt)=>apt.available==="Now"?"Available now":apt.available==="Contact"?"Contact for dates":"Move-in "+apt.available;
const matchesTime=(apt,value)=>value==="all"||value==="now"&&apt.available==="Now"||value==="spring"&&apt.as<=1||value==="summer"&&apt.as>=2&&apt.as<=4||value==="contact"&&apt.available==="Contact";
const icon=(path)=>html`<svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.7" aria-hidden="true"><path d=${path}></path></svg>`;
const pin=()=>html`<svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.7" aria-hidden="true"><path d="M12 21s7-6.08 7-11a7 7 0 1 0-14 0c0 4.92 7 11 7 11Z"></path><circle cx="12" cy="10" r="2.5"></circle></svg>`;
const spark=()=>html`<svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.7" aria-hidden="true"><path d="m12 3 1.95 4.58L18.5 9.5l-4.55 1.92L12 16l-1.95-4.58L5.5 9.5l4.55-1.92L12 3Z"></path></svg>`;
const search=()=>html`<svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.7" aria-hidden="true"><circle cx="11" cy="11" r="7"></circle><path d="m20 20-3.5-3.5"></path></svg>`;
function App(){
  const reduce=useReducedMotion();
  const [query,setQuery]=useState("");
  const [sortBy,setSortBy]=useState("availability");
  const [maxRent,setMaxRent]=useState(2400);
  const [time,setTime]=useState("all");
  const [petsOnly,setPetsOnly]=useState(false);
  const [twoBathsOnly,setTwoBathsOnly]=useState(false);
  const [saved,setSaved]=useState([]);
  useEffect(()=>{try{const raw=localStorage.getItem("apartments-saved");if(raw){const parsed=JSON.parse(raw);if(Array.isArray(parsed))setSaved(parsed);}}catch{}},[]);
  useEffect(()=>{try{localStorage.setItem("apartments-saved",JSON.stringify(saved));}catch{}},[saved]);
  const filtered=useMemo(()=>{
    const q=query.trim().toLowerCase();
    return apts.filter((apt)=>{
      const hay=(apt.name+" "+apt.address+" "+apt.am.join(" ")+" "+(apt.note||"")).toLowerCase();
      if(q&&!hay.includes(q)) return false;
      if(apt.rent[0]>maxRent) return false;
      if(!matchesTime(apt,time)) return false;
      if(petsOnly&&!apt.pets) return false;
      if(twoBathsOnly&&apt.baths<2) return false;
      return true;
    }).sort((a,b)=>{
      if(sortBy==="rent") return a.rent[0]-b.rent[0];
      if(sortBy==="largest") return b.sqft-a.sqft;
      if(sortBy==="value") return a.rent[0]/a.sqft-b.rent[0]/b.sqft;
      return a.as-b.as||a.rent[0]-b.rent[0];
    });
  },[query,sortBy,maxRent,time,petsOnly,twoBathsOnly]);
  const avgRent=filtered.length?Math.round(filtered.reduce((s,a)=>s+a.rent[0],0)/filtered.length):0;
  const avgSqft=filtered.length?Math.round(filtered.reduce((s,a)=>s+a.sqft,0)/filtered.length):0;
  const snapshot=[["Listings tracked",apts.length],["Available now",apts.filter((a)=>a.available==="Now").length],["Lowest entry",fmt(Math.min(...apts.map((a)=>a.rent[0])))],["2-bath options",apts.filter((a)=>a.baths>=2).length]];
  const summary=[["Visible",filtered.length],["Avg entry",avgRent?fmt(avgRent):"—"],["Avg size",avgSqft?avgSqft+" sq ft":"—"],["Saved",saved.length]];
  const reset=()=>{setQuery("");setSortBy("availability");setMaxRent(2400);setTime("all");setPetsOnly(false);setTwoBathsOnly(false);};
  const toggleSave=(id)=>setSaved((current)=>current.includes(id)?current.filter((item)=>item!==id):current.concat(id));
  return html`
    <div>
      <header class="topbar">
        <div class="shell topbar-row">
          <a class="brand" href="#listings">
            <span class="brand-mark glass">${pin()}</span>
            <span>
              <div class="brand-title">Squirrel Hill Apartments</div>
              <div class="brand-copy">Curated 2BR search for Pittsburgh 15217</div>
            </span>
          </a>
          <nav class="nav-links">
            <a href="#filters">Filters</a>
            <a href="#listings">Listings</a>
            <a href="#sources">Sources</a>
          </nav>
        </div>
      </header>
      <main>
        <section class="hero shell">
          <motion.div class="hero-card glass" initial=${reduce?false:{opacity:0,y:20}} animate=${reduce?false:{opacity:1,y:0}} transition=${reduce?{duration:0}:{duration:.6,ease:[.22,1,.36,1]}}>
            <div class="hero-grid">
              <div>
                <div class="eyebrow">${spark()}<span>Luxury-directory treatment</span></div>
                <h1 class="hero-title">Find the right 2BR in Squirrel Hill.</h1>
                <p class="hero-copy">A cleaner, more editorial apartment shortlist for ZIP 15217, tuned for budget, pets, larger layouts, and 2026 move-in timing.</p>
                <div class="hero-search">
                  <label class="input-shell">
                    <span style=${{color:"var(--gold)"}}>${search()}</span>
                    <input type="text" aria-label="Search apartments" value=${query} onInput=${(e)=>setQuery(e.target.value)} placeholder="Search Hobart, Frick Park, in-unit laundry..." />
                  </label>
                  <a class="cta" href="#listings" style=${{display:"inline-flex"}}>Browse listings</a>
                </div>
                <p class="hero-note">Designed from the installed UI/UX Pro Max guidance, but kept buildless so GitHub Pages can host it as a single file.</p>
              </div>
              <div class="snapshot glass">
                <div class="eyebrow">Live snapshot</div>
                <div class="snapshot-grid">
                  ${snapshot.map(([label,value])=>html`<div class="snapshot-item" key=${label}><span class="brand-copy">${label}</span><strong>${value}</strong></div>`)}
                </div>
              </div>
            </div>
          </motion.div>
        </section>
        <section id="filters" class="section shell">
          <div class="filters-card glass">
            <div class="filters-grid">
              <label class="input-shell">
                <span style=${{color:"var(--gold)"}}>${search()}</span>
                <input type="text" aria-label="Search listings" value=${query} onInput=${(e)=>setQuery(e.target.value)} placeholder="Search by street, amenity, or property..." />
              </label>
              <label class="field"><span>Max rent</span><select value=${maxRent} onChange=${(e)=>setMaxRent(Number(e.target.value))}>${rentOptions.map(([value,label])=>html`<option key=${value} value=${value}>${label}</option>`)}</select></label>
              <label class="field"><span>Availability</span><select value=${time} onChange=${(e)=>setTime(e.target.value)}>${availabilityOptions.map(([value,label])=>html`<option key=${value} value=${value}>${label}</option>`)}</select></label>
              <label class="field"><span>Sort by</span><select value=${sortBy} onChange=${(e)=>setSortBy(e.target.value)}>${sortOptions.map(([value,label])=>html`<option key=${value} value=${value}>${label}</option>`)}</select></label>
            </div>
            <div class="filter-row" style=${{marginTop:"16px"}}>
              <button class=${"chip"+(petsOnly?" is-active":"")} type="button" onClick=${()=>setPetsOnly((v)=>!v)}>Pet friendly only</button>
              <button class=${"chip"+(twoBathsOnly?" is-active":"")} type="button" onClick=${()=>setTwoBathsOnly((v)=>!v)}>2 baths only</button>
              <button class="chip" type="button" onClick=${reset}>Reset filters</button>
            </div>
          </div>
        </section>
        <section id="listings" class="section shell">
          <div class="section-head">
            <div>
              <div class="eyebrow">Curated directory</div>
              <h2 class="section-title">Scroll the shortlist.</h2>
            </div>
            <p class="section-copy">Cards prioritize quick rent comparison, move-in timing, and handoff to the real listing page without clutter.</p>
          </div>
          <div class="stats-row" style=${{marginBottom:"18px"}}>
            ${summary.map(([label,value])=>html`<div class="summary-pill glass" key=${label}><span class="summary-label">${label}</span><strong>${value}</strong></div>`)}
          </div>
          ${filtered.length?html`
            <motion.div layout class="list-grid">
              <AnimatePresence mode="popLayout">
                ${filtered.map((apt,index)=>{
                  const tag=tagStyles[apt.tag]||null;
                  const savedNow=saved.includes(apt.id);
                  return html`
                    <motion.article
                      key=${apt.id}
                      layout
                      class="card glass"
                      initial=${reduce?false:{opacity:0,y:18,filter:"blur(8px)"}}
                      animate=${reduce?false:{opacity:1,y:0,filter:"blur(0px)"}}
                      exit=${reduce?false:{opacity:0,y:-8,filter:"blur(8px)"}}
                      transition=${reduce?{duration:0}:{duration:.42,delay:index*.02,ease:[.22,1,.36,1]}}
                    >
                      <div class="card-inner">
                        <div class="card-top">
                          <div>
                            <div class="chip-row">
                              <span class=${"badge"+(apt.available==="Now"?" badge-available":"")}>${whenText(apt)}</span>
                              ${tag?html`<span class="badge" style=${{background:tag.b,color:tag.t,borderColor:tag.br}}>${apt.tag}</span>`:null}
                            </div>
                            <h3 class="card-title">${apt.name}</h3>
                            <p class="card-address">${apt.address}</p>
                          </div>
                          <button class=${"save-btn"+(savedNow?" is-active":"")} type="button" aria-label=${savedNow?"Remove saved apartment":"Save apartment"} onClick=${()=>toggleSave(apt.id)}>${savedNow?"Saved":"Save"}</button>
                        </div>
                        <div class="metrics">
                          <div class="metric"><div class="metric-label">Entry rent</div><div class="metric-value">${rentText(apt)}</div></div>
                          <div class="metric"><div class="metric-label">Floor plan</div><div class="metric-value">${apt.sqft.toLocaleString()} sq ft</div></div>
                          <div class="metric"><div class="metric-label">Layout</div><div class="metric-value">${apt.beds} bed · ${apt.baths} bath</div></div>
                        </div>
                        <div class="card-meta">
                          <span>${apt.pets?"Pet friendly":"No pets listed"}</span>
                          <span>·</span>
                          <span>${apt.phone}</span>
                        </div>
                        ${apt.note?html`<div class="card-note">${apt.note}</div>`:null}
                        <div class="amenities">
                          ${apt.am.map((item)=>html`<span class="amenity" key=${item}>${item}</span>`)}
                        </div>
                      </div>
                      <div class="card-actions">
                        <span class="brand-copy">${apt.available==="Now"?"Fastest handoff":"Confirm unit-level pricing before applying"}</span>
                        <a class="action-link" href=${apt.url} target="_blank" rel="noopener noreferrer">Open pricing page →</a>
                      </div>
                    </motion.article>
                  `;
                })}
              </AnimatePresence>
            </motion.div>
          `:html`
            <div class="empty glass section-card">
              <h3 class="empty-title">No listings match that combination.</h3>
              <p class="empty-copy">Try widening the rent cap, changing the move-in timing, or turning off the specialty filters.</p>
              <button class="chip is-active" type="button" onClick=${reset} style=${{marginTop:"18px"}}>Reset filters</button>
            </div>
          `}
        </section>
        <section id="sources" class="section shell">
          <div class="footer-card glass">
            <div class="footer-grid">
              <div>
                <div class="eyebrow">Source note</div>
                <h2 class="footer-title">Compiled for faster apartment hunting, not as a brokerage feed.</h2>
              </div>
              <p class="footer-copy">Listings were compiled from Apartments.com, Homes.com, Walnut Capital, Tripalink, Zumper, ApartmentHomeLiving, and Squirrel Hill Flats in April 2026. Treat this as a shortlist, then confirm rent, deposits, and unit availability directly on each linked property page.</p>
            </div>
          </div>
        </section>
      </main>
    </div>
  `;
}
createRoot(document.getElementById("root")).render(html`<${App} />`);
</script>
</body>
